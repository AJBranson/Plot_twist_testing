<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌾 Plot Twist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ROOT & RESET
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #111D0F;
  --bg-surface:  #182B14;
  --bg-panel:    #1F3819;
  --plot-locked: #1A1A1A;
  --soil-a:      #5C3210;
  --soil-b:      #7A4422;
  --soil-c:      #4A2510;
  --gold:        #FFD140;
  --gold-dark:   #C89400;
  --coin-glow:   rgba(255,209,64,0.3);
  --xp-purple:   #A78BFA;
  --green-hi:    #6FCF3A;
  --green-mid:   #4CAF50;
  --green-dim:   #2D6B20;
  --ready-glow:  #9AFF50;
  --lock-col:    #4A4A4A;
  --text:        #E8F5DC;
  --text-dim:    rgba(232,245,220,0.55);
  --border:      rgba(120,200,60,0.22);
  --panel-bg:    rgba(20,42,16,0.97);
  --radius:      12px;
  --ff-head:     'Fredoka One', 'Trebuchet MS', sans-serif;
  --ff-body:     'Nunito', 'Segoe UI', sans-serif;
}

body {
  font-family: var(--ff-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Metanet.page nav bar overlaps the top 70px of the iframe.
   This background strip blends the game header into that nav area. */
body::before {
  content: '';
  display: block;
  height: 70px;
  background: linear-gradient(180deg, #0C1A08 0%, #0C1A08 100%);
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 99; /* below header (100) */
  pointer-events: none;
}

button { cursor: pointer; font-family: var(--ff-body); border: none; outline: none; }
button:active { transform: scale(0.95); }

/* ============================================================
   LAYOUT
   ============================================================ */
#game {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  padding-top: 70px; /* Account for Metanet.page nav bar overlay */
}

/* ============================================================
   HEADER
   ============================================================ */
#header {
  background: linear-gradient(180deg, #0C1A08 0%, #182B14 100%);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}

/* Center header content without clipping the background */
.header-inner {
  max-width: 980px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.game-title {
  font-family: var(--ff-head);
  font-size: 22px;
  color: var(--green-hi);
  text-shadow: 0 2px 8px rgba(111,207,58,0.5);
  white-space: nowrap;
  margin-right: 4px;
}

.header-stats {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  flex: 1;
}

.stat-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
}

.stat-pill .icon { font-size: 15px; }
.stat-pill.coins .val { color: var(--gold); }
.stat-pill.score .val { color: #7DD3FC; }

.level-pill {
  display: flex;
  flex-direction: column;
  gap: 3px;
  background: rgba(167,139,250,0.1);
  border: 1px solid rgba(167,139,250,0.3);
  border-radius: 20px;
  padding: 5px 12px;
}

.level-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 12px;
  font-weight: 700;
}

.level-badge {
  color: var(--xp-purple);
  font-family: var(--ff-head);
  font-size: 14px;
}

.level-title-text { color: var(--text-dim); font-size: 11px; }
.xp-text { color: var(--xp-purple); font-size: 11px; }

.xp-bar-outer {
  width: 120px;
  height: 5px;
  background: rgba(167,139,250,0.15);
  border-radius: 3px;
  overflow: hidden;
}

.xp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--xp-purple), #C4B5FD);
  border-radius: 3px;
  transition: width 0.6s ease;
}

.bsv-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,209,64,0.06);
  border: 1px solid rgba(255,209,64,0.2);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 12px;
  color: var(--text-dim);
  margin-left: auto;
}

.bsv-pill button {
  background: var(--gold);
  color: #1A1000;
  border-radius: 10px;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 800;
  font-family: var(--ff-body);
}

/* ============================================================
   MAIN AREA
   ============================================================ */
#main {
  display: grid;
  grid-template-columns: 1fr 270px;
  gap: 0;
  flex: 1;
  min-height: 0;
  /* Center the gameplay area; prevents it stretching on wide screens */
  max-width: 980px;
  width: 100%;
  margin: 0 auto;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

/* ============================================================
   FARM AREA
   ============================================================ */
#farm-area {
  padding: 16px;
  overflow-y: auto;
}

#farm-heading {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.farm-name-wrap, .farmer-name-wrap {
  display: flex;
  align-items: baseline;
  gap: 5px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 6px;
  transition: background 0.15s;
}
.farm-name-wrap:hover, .farmer-name-wrap:hover {
  background: rgba(111,207,58,0.1);
}
.farm-name-text {
  font-family: var(--ff-head);
  font-size: 18px;
  color: var(--text);
  letter-spacing: 0.3px;
}
.farmer-label {
  font-family: var(--ff-body);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.farmer-name-text {
  font-family: var(--ff-head);
  font-size: 16px;
  color: var(--green-hi);
}
.name-edit-icon {
  font-size: 10px;
  color: var(--text-dim);
  opacity: 0;
  transition: opacity 0.15s;
  margin-left: 2px;
}
.farm-name-wrap:hover .name-edit-icon,
.farmer-name-wrap:hover .name-edit-icon { opacity: 1; }
.name-input {
  font-family: var(--ff-head);
  background: rgba(255,255,255,0.06);
  border: 1.5px solid var(--green-hi);
  border-radius: 6px;
  color: var(--text);
  padding: 2px 7px;
  outline: none;
  width: 140px;
  max-width: 140px;
}

#plots-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

/* ============================================================
   PLOT TILES
   ============================================================ */
.plot-tile {
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  transition: transform 0.15s, box-shadow 0.15s;
  user-select: none;
}

.plot-tile:hover { transform: translateY(-2px); }

.plot-visual {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  border-radius: var(--radius) var(--radius) 0 0;
  overflow: hidden;
}

.plot-soil-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.plot-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.plot-label {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.5);
  padding: 3px 4px;
  font-size: 10px;
  font-weight: 800;
  text-align: center;
  color: var(--text);
}

/* States */
.plot-tile.locked .plot-visual {
  background: #131310;
  border: 2px solid rgba(255,255,255,0.06);
}

.plot-tile.empty .plot-visual {
  border: 2px solid rgba(90,50,20,0.6);
}

.plot-tile.plant-target .plot-visual {
  border: 2px dashed var(--green-hi);
  box-shadow: 0 0 12px rgba(111,207,58,0.4);
  animation: pulse-green 1.5s ease-in-out infinite;
}

.plot-tile.growing .plot-visual {
  border: 2px solid rgba(76,175,80,0.4);
}

.plot-tile.ready .plot-visual {
  border: 2px solid var(--ready-glow);
  box-shadow: 0 0 16px rgba(154,255,80,0.5);
  animation: pulse-ready 1.2s ease-in-out infinite;
}
.plot-tile.exotic-ready .plot-visual {
  border: 2px solid #FFD700;
  box-shadow: 0 0 16px rgba(255,215,0,0.5);
  animation: pulse-exotic 1.4s ease-in-out infinite;
}
.plot-tile.seeding .plot-visual {
  border: 2px solid #A78BFA;
}
.plot-tile.seed-ready .plot-visual {
  border: 2px solid #FFD700;
  animation: pulse-exotic 1.2s ease-in-out infinite;
}
@keyframes pulse-exotic {
  0%, 100% { box-shadow: 0 0 10px rgba(255,215,0,0.3); }
  50%       { box-shadow: 0 0 22px rgba(255,215,0,0.7); }
}

.plot-footer {
  background: rgba(10,20,8,0.85);
  padding: 4px 6px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
  text-align: center;
  border-top: 1px solid var(--border);
  border-radius: 0 0 var(--radius) var(--radius);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.plot-footer .footer-harvest {
  color: var(--ready-glow);
  font-size: 11px;
}

.plus-sign {
  font-size: 28px;
  color: rgba(255,255,255,0.18);
  font-weight: 300;
  line-height: 1;
}

.plant-target .plus-sign {
  color: rgba(111,207,58,0.5);
}

/* Progress ring */
.progress-ring-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
  pointer-events: none;
}

.progress-ring-bg { fill: none; stroke: rgba(255,255,255,0.06); }
.progress-ring-fill { fill: none; stroke: var(--green-mid); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }

/* Crop art on plot */
.crop-art {
  transition: transform 0.5s ease, opacity 0.5s ease;
  transform-origin: bottom center;
}

/* Harvest sparkle */
@keyframes pulse-green {
  0%, 100% { box-shadow: 0 0 8px rgba(111,207,58,0.3); }
  50%       { box-shadow: 0 0 20px rgba(111,207,58,0.7); }
}
@keyframes pulse-ready {
  0%, 100% { box-shadow: 0 0 12px rgba(154,255,80,0.4); }
  50%       { box-shadow: 0 0 28px rgba(154,255,80,0.9); }
}
@keyframes harvest-pop {
  0%   { transform: scale(1); opacity: 1; }
  50%  { transform: scale(1.3); opacity: 0.8; }
  100% { transform: scale(0); opacity: 0; }
}
@keyframes coin-float {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-50px) scale(0.8); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-5px); }
  40%, 80% { transform: translateX(5px); }
}
.shake { animation: shake 0.4s ease; }

/* ============================================================
   WATERING CAN
   ============================================================ */
#watering-can-area {
  margin-top: 14px;
  display: flex;
  align-items: center;
  gap: 14px;
}

#watering-can-btn {
  position: relative;
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.15s;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
}
#watering-can-btn:hover { transform: translateY(-2px) rotate(-8deg); }
#watering-can-btn:active { transform: scale(0.92) rotate(-12deg); }
#watering-can-btn:disabled { cursor: not-allowed; opacity: 0.5; transform: none; }

#watering-can-info {
  flex: 1;
  min-width: 0;
}

#watering-can-label {
  font-family: var(--ff-head);
  font-size: 14px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 5px;
}

#watering-can-status {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
}

#watering-can-bar-outer {
  width: 100%;
  height: 7px;
  background: rgba(255,255,255,0.07);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 5px;
}

#watering-can-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, #4FC3F7, #81D4FA);
  transition: width 1s linear, background 0.4s;
}

#watering-can-bar-fill.full {
  background: linear-gradient(90deg, #29B6F6, #00E5FF);
  box-shadow: 0 0 8px rgba(41,182,246,0.6);
}

@keyframes can-splash {
  0%   { transform: translateY(-2px) rotate(-12deg); }
  30%  { transform: translateY(2px)  rotate(-18deg); }
  60%  { transform: translateY(-1px) rotate(-10deg); }
  100% { transform: translateY(0)    rotate(0deg); }
}
.can-splashing { animation: can-splash 0.5s ease forwards; }

/* ============================================================
   COMPOST PILE
   ============================================================ */
#compost-area {
  margin-top: 14px;
  display: flex;
  align-items: center;
  gap: 14px;
}

#compost-btn {
  position: relative;
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.15s;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
}
#compost-btn:hover { transform: translateY(-2px) scale(1.05); }
#compost-btn:active { transform: scale(0.93); }
#compost-btn:disabled { cursor: not-allowed; opacity: 0.45; transform: none; filter: grayscale(0.6) drop-shadow(0 2px 6px rgba(0,0,0,0.3)); }

#compost-info { flex: 1; min-width: 0; }

#compost-label {
  font-family: var(--ff-head);
  font-size: 14px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 5px;
}

#compost-status {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
}

.compost-pips {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}

.compost-pip {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1.5px solid rgba(139,195,74,0.3);
  background: rgba(255,255,255,0.05);
  transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.compost-pip.filled {
  background: rgba(104,159,56,0.5);
  border-color: #8BC34A;
  box-shadow: 0 0 6px rgba(139,195,74,0.4);
}

/* Fertilised plot indicator badge */
.plot-fertilised-badge {
  position: absolute;
  top: 4px;
  left: 4px;
  background: rgba(104,159,56,0.85);
  border: 1px solid #8BC34A;
  border-radius: 6px;
  font-size: 10px;
  padding: 1px 5px;
  font-weight: 800;
  color: #F1F8E9;
  pointer-events: none;
  z-index: 2;
}

/* Fertilise-target glow on plots */
.plot-tile.fertilise-target .plot-visual {
  border: 2px dashed #8BC34A !important;
  box-shadow: 0 0 14px rgba(139,195,74,0.5);
  animation: pulse-compost 1.4s ease-in-out infinite;
}
@keyframes pulse-compost {
  0%, 100% { box-shadow: 0 0 8px rgba(139,195,74,0.3); }
  50%       { box-shadow: 0 0 22px rgba(139,195,74,0.7); }
}


/* ============================================================
   VEGE STAND MARKETPLACE
   ============================================================ */
#vege-stand-area {
  margin-top: 14px;
}

#vege-stand-btn:hover { transform: translateY(-2px) scale(1.05); }
#vege-stand-btn:active { transform: scale(0.93); }

.stand-listing-row { transition: background 0.12s; }
.stand-listing-row:hover { background: rgba(255,255,255,0.05) !important; }

#list-seeds-btn:hover:not(:disabled) { background: rgba(255,209,64,0.25) !important; }

.market-listing-row { transition: background 0.12s, border-color 0.12s; }
.market-listing-row:hover { background: rgba(30,55,20,0.8) !important; }

.market-filter-btn { transition: background 0.15s, color 0.15s, border-color 0.15s; }
.market-filter-btn:hover { opacity: 0.85; }

#buy-confirm-overlay { animation: fade-in 0.2s ease; }

/* ============================================================
   SHOP SIDEBAR
   ============================================================ */
#shop-sidebar {
  background: var(--panel-bg);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#shop-header {
  padding: 12px 14px 8px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
}

#shop-title {
  font-family: var(--ff-head);
  font-size: 16px;
  color: var(--green-hi);
}

#shop-hint {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 3px;
  min-height: 15px;
}

#shop-crops-list {
  overflow-y: auto;
  flex: 1;
  padding: 8px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
  align-content: start;
}

/* Scrollbar styling */
#shop-crops-list::-webkit-scrollbar { width: 4px; }
#shop-crops-list::-webkit-scrollbar-track { background: transparent; }
#shop-crops-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.shop-level-divider {
  font-size: 10px;
  font-weight: 800;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 4px 2px 2px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
  /* Span both columns */
  grid-column: 1 / -1;
}

.crop-card {
  display: flex;
  flex-direction: column;
  gap: 5px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 7px 7px 6px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  position: relative;
  /* Remove the old flex-row assumptions */
}

.crop-card:hover { background: rgba(111,207,58,0.08); border-color: rgba(111,207,58,0.3); }

.crop-card.selected {
  background: rgba(111,207,58,0.15);
  border-color: var(--green-hi);
  box-shadow: 0 0 10px rgba(111,207,58,0.25);
}

.crop-card.locked-crop {
  opacity: 0.4;
  cursor: not-allowed;
  filter: grayscale(0.6);
}

.crop-card.unaffordable {
  opacity: 0.6;
}

.crop-card-icon {
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  border-radius: 7px;
  overflow: hidden;
}

.crop-card-info {
  flex: 1;
  min-width: 0;
}

.crop-card-name {
  font-size: 11px;
  font-weight: 800;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.crop-card-stats {
  display: flex;
  gap: 4px;
  margin-top: 2px;
  font-size: 9px;
  color: var(--text-dim);
  flex-wrap: wrap;
}

.crop-stat-coin { color: var(--gold); font-weight: 700; }
.crop-stat-sell { color: var(--green-hi); font-weight: 700; }
.crop-stat-time { color: #93C5FD; }

.crop-lock-badge {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 9px;
  background: rgba(100,100,100,0.5);
  padding: 2px 5px;
  border-radius: 8px;
  color: var(--text-dim);
  white-space: nowrap;
}

/* ============================================================
   NOTIFICATIONS & LEVEL UP
   ============================================================ */
#notif-container {
  position: fixed;
  top: 70px;
  right: 16px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.notif {
  background: rgba(20,40,16,0.96);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  animation: notif-in 0.3s ease forwards;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  max-width: 240px;
}

.notif.harvest  { border-color: var(--green-hi); }
.notif.levelup  { border-color: var(--xp-purple); background: rgba(30,20,50,0.97); }
.notif.unlock   { border-color: var(--gold); }
.notif.error    { border-color: #FF6B6B; }

@keyframes notif-in {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes notif-out {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(20px); }
}
.notif.leaving { animation: notif-out 0.3s ease forwards; }

/* Floating coin label */
.float-label {
  position: fixed;
  font-family: var(--ff-head);
  font-size: 18px;
  color: var(--gold);
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  pointer-events: none;
  z-index: 300;
  animation: coin-float 0.9s ease forwards;
}

/* ============================================================
   MOBILE
   ============================================================ */
@media (max-width: 768px) {
  #main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; border-left: none; border-right: none; }
  #shop-sidebar { border-left: none; border-top: 1px solid var(--border); max-height: 260px; }
  #shop-crops-list { flex-direction: row; flex-wrap: wrap; }
  .shop-level-divider { width: 100%; }
  .crop-card { width: calc(50% - 6px); flex-shrink: 0; }
  #plots-grid { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 480px) {
  #plots-grid { grid-template-columns: repeat(2, 1fr); }
  .header-stats { gap: 6px; }
  .xp-bar-outer { width: 80px; }
}

/* ============================================================
   STORAGE AREA
   ============================================================ */
#storage-area {
  margin-top: 18px;
}

#storage-heading {
  font-family: var(--ff-head);
  font-size: 15px;
  color: var(--text-dim);
  margin-bottom: 10px;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}

#storage-count-badge {
  font-family: var(--ff-body);
  font-size: 10px;
  font-weight: 800;
  background: rgba(111,207,58,0.18);
  color: var(--green-hi);
  border-radius: 10px;
  padding: 2px 7px;
}

#storage-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.storage-empty {
  color: var(--text-dim);
  font-size: 12px;
  padding: 10px 4px;
  font-style: italic;
}

.seed-tile {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  transition: transform 0.12s;
  user-select: none;
}

.seed-tile:hover { transform: translateY(-2px); }

.seed-tile-art {
  position: relative;
  width: 52px;
  height: 52px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  overflow: hidden;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.seed-tile.selected .seed-tile-art {
  border-color: var(--green-hi);
  box-shadow: 0 0 10px rgba(111,207,58,0.5);
}

.seed-tile-count {
  position: absolute;
  top: 2px;
  right: 3px;
  background: var(--gold);
  color: #1A1000;
  font-size: 9px;
  font-weight: 900;
  font-family: var(--ff-body);
  border-radius: 7px;
  padding: 1px 4px;
  line-height: 1.3;
  pointer-events: none;
}

.seed-tile-name {
  font-size: 9px;
  font-weight: 700;
  color: var(--text-dim);
  text-align: center;
  max-width: 52px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.seed-tile.selected .seed-tile-name { color: var(--green-hi); }

/* ============================================================
   SHOP QTY PICKER
   ============================================================ */
.crop-card-qty {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--border);
}

.qty-btn {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  background: rgba(255,255,255,0.08);
  color: var(--text);
  font-size: 14px;
  font-weight: 700;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.1s;
}

.qty-btn:hover { background: rgba(255,255,255,0.16); }

.qty-display {
  min-width: 22px;
  text-align: center;
  font-size: 13px;
  font-weight: 800;
  color: var(--text);
}

.qty-total {
  flex: 1;
  font-size: 10px;
  color: var(--gold);
  font-weight: 700;
  text-align: right;
}

.buy-btn {
  background: var(--green-hi);
  color: #0A1F06;
  font-size: 11px;
  font-weight: 800;
  font-family: var(--ff-body);
  border-radius: 8px;
  padding: 4px 10px;
  transition: background 0.15s;
  flex-shrink: 0;
}

.buy-btn:hover { background: #88F54A; }
.buy-btn:disabled { background: rgba(111,207,58,0.25); color: var(--text-dim); cursor: not-allowed; }

.bsv-buy-btn {
  background: linear-gradient(135deg, #C8860A, #F5A623);
  color: #1A0800;
  font-size: 11px;
  font-weight: 800;
  font-family: var(--ff-body);
  border-radius: 8px;
  padding: 4px 8px;
  transition: opacity 0.15s;
  flex-shrink: 0;
  white-space: nowrap;
}
.bsv-buy-btn:hover { opacity: 0.85; }
.bsv-buy-btn:disabled { background: rgba(200,134,10,0.25); color: var(--text-dim); cursor: not-allowed; }

.crop-card.expanded {
  background: rgba(111,207,58,0.09);
  border-color: rgba(111,207,58,0.4);
  flex-direction: column;
  align-items: stretch;
  /* Span both columns when the qty picker is open */
  grid-column: 1 / -1;
}

.crop-card.expanded .crop-card-main {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ============================================================
   MISC
   ============================================================ */
.selected-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(111,207,58,0.12);
  border: 1px solid var(--green-hi);
  border-radius: 10px;
  padding: 5px 10px;
  margin: 6px 8px 0;
  font-size: 11px;
  color: var(--green-hi);
  font-weight: 700;
  /* Span full width — sits above the 2-col grid in its own element */
}

.selected-indicator button {
  background: rgba(255,255,255,0.1);
  color: var(--text);
  border-radius: 6px;
  padding: 2px 6px;
  font-size: 10px;
  margin-left: auto;
}
.prestige-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,209,64,0.08);
  border: 1px solid rgba(255,209,64,0.35);
  border-radius: 20px;
  padding: 4px 11px;
  font-size: 12px;
  font-weight: 800;
  color: var(--gold);
  cursor: pointer;
  transition: background 0.15s, box-shadow 0.15s;
  white-space: nowrap;
}
.prestige-pill:hover {
  background: rgba(255,209,64,0.18);
  box-shadow: 0 0 10px rgba(255,209,64,0.3);
}
.prestige-pill.max {
  border-color: rgba(255,150,0,0.6);
  background: rgba(255,150,0,0.12);
  color: #FFA040;
}
.prestige-ready {
  animation: prestige-pulse 1.5s ease-in-out infinite;
}
@keyframes prestige-pulse {
  0%, 100% { box-shadow: 0 0 6px rgba(255,209,64,0.3); }
  50%       { box-shadow: 0 0 18px rgba(255,209,64,0.8); }
}

/* ============================================================
   IN-GAME CONFIRM MODAL
   ============================================================ */
#confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 450;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  animation: fade-in 0.2s ease;
}
#confirm-overlay.hidden { display: none; }

#confirm-card {
  background: linear-gradient(160deg, #182B14 0%, #111D0F 100%);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 24px 22px 20px;
  max-width: 320px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  animation: card-pop 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
#event-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 400;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  animation: fade-in 0.25s ease;
}
#event-overlay.hidden { display: none; }

@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}

#event-card {
  background: linear-gradient(160deg, #182B14 0%, #111D0F 100%);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 24px 22px 20px;
  max-width: 340px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  animation: card-pop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes card-pop {
  from { transform: scale(0.88); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}

.event-icon {
  font-size: 40px;
  text-align: center;
  display: block;
  margin-bottom: 10px;
}

.event-title {
  font-family: var(--ff-head);
  font-size: 20px;
  color: var(--text);
  text-align: center;
  margin-bottom: 6px;
}

.event-desc {
  font-size: 13px;
  color: var(--text-dim);
  text-align: center;
  line-height: 1.55;
  margin-bottom: 18px;
}

.event-btns {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.event-btn-primary {
  background: var(--green-hi);
  color: #0A1F06;
  font-family: var(--ff-body);
  font-size: 13px;
  font-weight: 800;
  border-radius: 10px;
  padding: 8px 18px;
  transition: background 0.15s;
}
.event-btn-primary:hover { background: #88F54A; }
.event-btn-primary:disabled {
  background: rgba(111,207,58,0.25);
  color: var(--text-dim);
  cursor: not-allowed;
}

.event-btn-secondary {
  background: rgba(255,255,255,0.07);
  color: var(--text-dim);
  font-family: var(--ff-body);
  font-size: 13px;
  font-weight: 700;
  border-radius: 10px;
  padding: 8px 18px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: background 0.15s;
}
.event-btn-secondary:hover { background: rgba(255,255,255,0.13); }

/* ============================================================
   WANDERING MERCHANT BANNER
   ============================================================ */
#merchant-banner {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 350;
  background: linear-gradient(135deg, #1A0F2E 0%, #2D1B00 100%);
  border: 1.5px solid rgba(255,190,60,0.5);
  border-radius: 16px;
  padding: 14px 18px;
  max-width: 420px;
  width: calc(100% - 32px);
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 20px rgba(255,190,60,0.15);
  display: flex;
  align-items: center;
  gap: 14px;
  animation: merchant-slide 0.4s cubic-bezier(0.34,1.4,0.64,1);
}
#merchant-banner.hidden { display: none; }

@keyframes merchant-slide {
  from { transform: translateX(-50%) translateY(100px); opacity: 0; }
  to   { transform: translateX(-50%) translateY(0);    opacity: 1; }
}

.merchant-icon {
  font-size: 34px;
  flex-shrink: 0;
}

.merchant-body {
  flex: 1;
  min-width: 0;
}

.merchant-title {
  font-family: var(--ff-head);
  font-size: 14px;
  color: #FFD090;
  margin-bottom: 3px;
}

.merchant-offer {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.4;
}

.merchant-timer {
  font-size: 10px;
  color: rgba(255,190,60,0.6);
  margin-top: 3px;
  font-weight: 700;
}

.merchant-btns {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}

.merchant-btn-deal {
  background: linear-gradient(135deg, #FFB020, #FF8C00);
  color: #1A0800;
  font-family: var(--ff-body);
  font-size: 12px;
  font-weight: 800;
  border-radius: 8px;
  padding: 6px 14px;
  white-space: nowrap;
  transition: opacity 0.15s;
}
.merchant-btn-deal:hover { opacity: 0.88; }
.merchant-btn-deal:disabled {
  background: rgba(255,140,0,0.25);
  color: var(--text-dim);
  cursor: not-allowed;
}

.merchant-btn-pass {
  background: transparent;
  color: var(--text-dim);
  font-family: var(--ff-body);
  font-size: 11px;
  font-weight: 700;
  border-radius: 8px;
  padding: 4px 10px;
  border: 1px solid rgba(255,255,255,0.1);
  text-align: center;
  transition: background 0.15s;
}
.merchant-btn-pass:hover { background: rgba(255,255,255,0.07); }

/* ============================================================
   JOURNAL BUTTON
   ============================================================ */
.journal-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(167,139,250,0.10);
  border: 1px solid rgba(167,139,250,0.3);
  border-radius: 18px;
  padding: 4px 11px;
  font-size: 12px;
  font-weight: 800;
  font-family: var(--ff-body);
  color: var(--xp-purple);
  cursor: pointer;
  transition: background 0.15s, box-shadow 0.15s;
  position: relative;
  white-space: nowrap;
  margin-left: auto;
}
.journal-btn:hover {
  background: rgba(167,139,250,0.22);
  box-shadow: 0 0 10px rgba(167,139,250,0.25);
}
.journal-new-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  background: #FF6B6B;
  border-radius: 50%;
  margin-left: 2px;
  animation: jdot-pulse 1.4s ease-in-out infinite;
}
@keyframes jdot-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.7); }
}

/* ============================================================
   JOURNAL MODAL
   ============================================================ */
#journal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  animation: fade-in 0.2s ease;
}
#journal-overlay.hidden { display: none; }

#journal-modal {
  background: linear-gradient(160deg, #182B14 0%, #0F1D0D 100%);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  width: 100%;
  max-width: 560px;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 24px 80px rgba(0,0,0,0.8);
  animation: card-pop 0.3s cubic-bezier(0.34,1.4,0.64,1);
  overflow: visible; /* allow tooltip to extend below header */
}

#journal-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

#journal-title {
  font-family: var(--ff-head);
  font-size: 18px;
  color: var(--xp-purple);
  flex-shrink: 0;
}

#journal-tabs {
  display: flex;
  gap: 5px;
  flex: 1;
}

.jtab {
  font-size: 11px;
  font-weight: 800;
  font-family: var(--ff-body);
  padding: 4px 12px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.jtab.active {
  background: var(--xp-purple);
  color: #1A0F2E;
  border-color: transparent;
}
.jtab:hover:not(.active) { background: rgba(167,139,250,0.12); }

.journal-close-btn {
  background: rgba(255,255,255,0.07);
  color: var(--text-dim);
  font-size: 14px;
  font-weight: 700;
  border-radius: 8px;
  padding: 4px 10px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: background 0.15s;
  flex-shrink: 0;
}
.journal-close-btn:hover { background: rgba(255,255,255,0.15); color: var(--text); }

#journal-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px 14px;
  border-radius: 0 0 18px 18px;
}
#journal-body::-webkit-scrollbar { width: 4px; }
#journal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.jtab-panel { display: none; }
.jtab-panel.active { display: block; }

/* ── Leaderboard tab ── */
.lb-share-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg, rgba(255,209,64,0.2), rgba(255,209,64,0.08));
  border: 1px solid rgba(255,209,64,0.5); border-radius: 10px;
  padding: 6px 14px; font-size: 12px; font-weight: 800;
  color: var(--gold); cursor: pointer; transition: background 0.15s, transform 0.1s;
  margin-left: auto;
}
.lb-share-btn:hover { background: rgba(255,209,64,0.22); }
.lb-share-btn:active { transform: scale(0.95); }
.lb-share-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.lb-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 9px;
  background: rgba(20,42,16,0.6); border: 1px solid var(--border);
  margin-bottom: 6px; transition: border-color 0.15s;
}
.lb-row.lb-mine { border-color: rgba(255,209,64,0.5); background: rgba(255,209,64,0.06); }
.lb-row.lb-top3 { border-color: rgba(111,207,58,0.4); }
.lb-rank { font-size: 16px; width: 28px; text-align: center; flex-shrink: 0; }
.lb-info { flex: 1; min-width: 0; }
.lb-name { font-size: 13px; font-weight: 800; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-sub  { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
.lb-score { font-size: 15px; font-weight: 800; color: var(--gold); flex-shrink: 0; text-align: right; }
.lb-empty { text-align: center; color: var(--text-dim); font-size: 13px; padding: 30px 0; }
.lb-loading { text-align: center; color: var(--text-dim); font-size: 12px; padding: 20px 0; }
.lb-section-title { font-size: 11px; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.6px; margin: 14px 0 8px; }
.lb-my-score-card {
  background: rgba(255,209,64,0.07); border: 1px solid rgba(255,209,64,0.3);
  border-radius: 10px; padding: 10px 12px; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.lb-my-score-card .lb-label { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
.lb-my-score-card .lb-value { font-size: 16px; font-weight: 800; color: var(--gold); }
.lb-my-score-card .lb-sub-val { font-size: 10px; color: var(--text-dim); }

#journal-footer {
  padding: 8px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
  text-align: center;
}

/* Achievement cards */
.ach-section-title {
  font-family: var(--ff-head);
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin: 14px 0 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.ach-section-title:first-child { margin-top: 2px; }

.ach-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 8px;
  margin-bottom: 4px;
}

.ach-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 10px 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: relative;
  transition: background 0.15s;
}
.ach-card.earned {
  background: rgba(167,139,250,0.10);
  border-color: rgba(167,139,250,0.4);
}
.ach-card.earned-new {
  background: rgba(167,139,250,0.18);
  border-color: var(--xp-purple);
  box-shadow: 0 0 10px rgba(167,139,250,0.3);
}
.ach-card.locked {
  opacity: 0.38;
}

.ach-icon {
  font-size: 22px;
  line-height: 1;
}
.ach-name {
  font-size: 11px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.3;
}
.ach-card.locked .ach-name { color: var(--text-dim); }
.ach-desc {
  font-size: 10px;
  color: var(--text-dim);
  line-height: 1.4;
}
.ach-earned-tick {
  position: absolute;
  top: 6px;
  right: 7px;
  font-size: 11px;
  color: var(--xp-purple);
}
.ach-progress {
  font-size: 9px;
  color: var(--text-dim);
  margin-top: 1px;
}
.ach-progress-bar {
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  margin-top: 3px;
  overflow: hidden;
}
.ach-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--xp-purple), #C4B5FD);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* Crop journal rows */
.crop-journal-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 6px;
  border-radius: 8px;
  transition: background 0.12s;
}
.crop-journal-row:hover { background: rgba(255,255,255,0.03); }
.crop-journal-art {
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  border-radius: 7px;
  overflow: hidden;
}
.crop-journal-info { flex: 1; min-width: 0; }
.crop-journal-name {
  font-size: 12px;
  font-weight: 800;

    } catch (err) { console.error('SDK send error:', err); }
  };
  const onCommand = (callback) => {
    window.addEventListener('message', (event) => {
      if (event.data && event.data.command === "ninja-app-command") callback(event.data);

  };
  window.platformSDK = { sendCommand, onCommand };
</script>

// Seedling SVG for growing state
function seedlingSVG(progress) {
  const h = 8 + progress * 22; // stem grows from 8 to 30
  const lw = 4 + progress * 8;
  const lo = 0.3 + progress * 0.5;
  return `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <rect x="${29}" y="${58 - h}" width="3" height="${h}" rx="1.5" fill="#2D6B20"/>
    <ellipse cx="${26 - lw*0.3}" cy="${58 - h + 4}" rx="${lw}" ry="${lw*0.55}" fill="#4CAF50" opacity="${lo}" transform="rotate(-25 ${26 - lw*0.3} ${58 - h + 4})"/>
    <ellipse cx="${34 + lw*0.3}" cy="${58 - h + 6}" rx="${lw}" ry="${lw*0.55}" fill="#66BB6A" opacity="${lo}" transform="rotate(25 ${34 + lw*0.3} ${58 - h + 6})"/>
  </svg>`;
}

// Progress ring SVG
function progressRingSVG(progress) {
  const r = 44;
  const cx = 50, cy = 50;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - progress);
  return `<svg class="progress-ring-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle class="progress-ring-bg" cx="${cx}" cy="${cy}" r="${r}" stroke-width="5"/>
    <circle class="progress-ring-fill" cx="${cx}" cy="${cy}" r="${r}"
      stroke-width="5"
      stroke-dasharray="${circ.toFixed(2)}"
      stroke-dashoffset="${offset.toFixed(2)}"/>
  </svg>`;
}

// Lock SVG
function lockSVG() {
  return `<svg width="32" height="38" viewBox="0 0 32 38" xmlns="http://www.w3.org/2000/svg">

}

  _exoticMishapsFix: 0,    // times player paid to fix a mishap
  _exoticNearMisses: 0,    // times a near-miss mishap was survived
  _heritageCollected: 0,   // total heritage seeds ever collected
};

let G = null; // game state

// ============================================================
// PERSISTENCE
// ============================================================
const SAVE_KEY = 'idle_farm_v1';

function saveGame() {
  try {
    const saveData = {
      coins: G.coins,
      totalXP: G.totalXP,
      level: G.level,
      prestige: G.prestige,
      farmName: G.farmName,
      farmerName: G.farmerName,
      inventory: G.inventory,
      plots: G.plots.map(p => ({
        idx: p.idx,
        unlocked: p.unlocked,
        harvestedCount: p.harvestedCount,
        cropId: p.cropId,
        plantedAt: p.plantedAt,
        ready: p.ready,
        fertilised: p.fertilised,
        seeding: p.seeding || false,
        seedingStartedAt: p.seedingStartedAt || null,
        seedingDuration: p.seedingDuration || null,
        seedReady: p.seedReady || false,
        heritage: p.heritage || false,
      })),
      walletConnected: G.walletConnected,
      walletAddress: G.walletAddress,
      cropHarvests: G.cropHarvests,
      totalHarvestCount: G.totalHarvestCount,
      totalCoinsEarned: G.totalCoinsEarned,
      achievementsEarned: G.achievementsEarned,
      lastEventTime: G.lastEventTime,
      merchantExpiry: G.merchantExpiry,
      merchantDeal: G.merchantDeal,
      _merchantDealsAccepted: G._merchantDealsAccepted || 0,
      _eventsEncountered: G._eventsEncountered || 0,
      _eventsFixed: G._eventsFixed || 0,
      _sunBonusCount: G._sunBonusCount || 0,
      _beeBoostCount: G._beeBoostCount || 0,
      wateringCanLastUsed: G.wateringCanLastUsed,
      compostCharges: G.compostCharges,
      compostLastCharged: G.compostLastCharged,
      seedsCollectedTotal: G.seedsCollectedTotal || 0,
      exoticMishapsTotal: G.exoticMishapsTotal || 0,
      _exoticMishapsFix: G._exoticMishapsFix || 0,
      _exoticNearMisses: G._exoticNearMisses || 0,
      _heritageCollected: G._heritageCollected || 0,
      standListings: G.standListings || [],
      standEnabled: G.standEnabled !== false,
      standMaxSlots: G.standMaxSlots || 3,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
  } catch(e) {
    console.warn('Save failed:', e);
    notify('⚠️ Game save failed. Your progress may not be preserved. Check your browser storage settings.', 'error');
  }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      G = JSON.parse(JSON.stringify(DEFAULT_STATE));
      G.coins = saved.coins ?? G.coins;
      G.totalXP = saved.totalXP ?? G.totalXP;
      G.level = saved.level ?? G.level;
      G.prestige = saved.prestige ?? 0;
      G.farmName = saved.farmName ?? 'My Farm';
      G.farmerName = saved.farmerName ?? 'Farmer';
      G.inventory = saved.inventory ?? {};
      G.walletConnected = saved.walletConnected ?? false;
      G.cropHarvests       = saved.cropHarvests       ?? {};
      G.totalHarvestCount  = saved.totalHarvestCount  ?? 0;
      G.totalCoinsEarned   = saved.totalCoinsEarned   ?? 0;
      G.achievementsEarned = saved.achievementsEarned ?? [];
      G.lastEventTime  = saved.lastEventTime  ?? 0;
      G.merchantExpiry = saved.merchantExpiry ?? 0;
      G.merchantDeal   = saved.merchantDeal   ?? null;
      G.merchantActive = (saved.merchantDeal && saved.merchantExpiry > Date.now());
      G._merchantDealsAccepted = saved._merchantDealsAccepted ?? 0;
      G._eventsEncountered = saved._eventsEncountered ?? 0;
      G._eventsFixed       = saved._eventsFixed       ?? 0;
      G._sunBonusCount     = saved._sunBonusCount     ?? 0;
      G._beeBoostCount     = saved._beeBoostCount     ?? 0;
      G.wateringCanLastUsed = saved.wateringCanLastUsed ?? 0;
      G.compostCharges    = Math.min(saved.compostCharges ?? 5, 5); // clamp — never exceed max
      G.compostLastCharged = saved.compostLastCharged ?? 0;
      G.seedsCollectedTotal  = saved.seedsCollectedTotal  ?? 0;
      G.exoticMishapsTotal   = saved.exoticMishapsTotal   ?? 0;
      G._exoticMishapsFix    = saved._exoticMishapsFix    ?? 0;
      G._exoticNearMisses    = saved._exoticNearMisses    ?? 0;
      G._heritageCollected   = saved._heritageCollected   ?? 0;
      G.standListings  = saved.standListings  ?? [];
      G.standEnabled   = saved.standEnabled   !== false;
      G.standMaxSlots  = saved.standMaxSlots  ?? 3;
      G.fertiliseMode = false;
      G.walletAddress = saved.walletAddress ?? null;
      if (saved.plots) {
        saved.plots.forEach((sp, i) => {
          if (G.plots[i]) Object.assign(G.plots[i], {
            ...sp,
            fertilised: sp.fertilised ?? false,
            seeding: sp.seeding ?? false,
            seedingStartedAt: sp.seedingStartedAt ?? null,
            seedingDuration: sp.seedingDuration ?? null,
            seedReady: sp.seedReady ?? false,
            heritage: sp.heritage ?? false,
          });
        });
      }
      G.selectedCrop = null;
      G.shopExpanded = null;
      return;
    }
  } catch(e) {
    console.warn('Load failed:', e);
    notify('⚠️ Could not load saved game. Starting with default settings.', 'error');
  }
  G = JSON.parse(JSON.stringify(DEFAULT_STATE));
}

// ============================================================
// HELPERS
// ============================================================
function getLevelData(lvl) { return LEVELS[Math.min(lvl - 1, LEVELS.length - 1)]; }
function getCurrentLevel() { return getLevelData(G.level); }

function getAvailableCrops() {
  return CROPS.filter(c => c.unlockLevel <= G.level);
}

function isCropUnlocked(cropId) {
  const c = CROP_MAP[cropId];
  if (!c) return false;
  if (c.exotic) return (G.inventory[cropId] || 0) > 0 || (G.inventory[cropId + '_heritage'] || 0) > 0;
  return c.unlockLevel <= G.level;
}

// Prestige sell multiplier: each prestige adds 10%
function prestigeMultiplier() {
  return 1 + (G.prestige * 0.10);
}

// Perform a prestige reset (only at level 10, max 50 prestiges)
function doPrestige() {
  if (G.level < 10) {
    notify('⚠️ Reach Level 10 (Master) to prestige!', 'error');
    return;
  }
  if (G.prestige >= 50) {
    notify('✨ Maximum prestige (50) already reached!', 'error');
    return;
  }
  const nextPrestige = G.prestige + 1;
  const bonus = Math.round(nextPrestige * 10);
  if (!confirm('Prestige ' + nextPrestige + '/50\n\nThis resets your farm to level 1 with 2 coins, but ALL harvest coins will permanently earn +' + bonus + '% more.\n\nProceed?')) return;

  G.prestige = nextPrestige;
  G.coins = 2;
  G.totalXP = 0;
  G.level = 1;
  G.selectedCrop = null;
  G.shopExpanded = null;
  G.fertiliseMode = false;
  G.compostCharges = 5;
  G.compostLastCharged = 0;
  G.inventory = {};
  G.plots = Array.from({length:20}, (_, i) => ({
    idx: i,
    unlocked: i === 0,
    harvestedCount: 0,
    cropId: null,
    plantedAt: null,
    ready: false,
  }));
  checkAchievements();
  saveGame();
  renderAll();
  notify('⭐ Prestige ' + nextPrestige + ' achieved! Sell bonus: +' + bonus + '%', 'levelup');
}

function calcFarmScore() {
  return Math.floor(Math.pow(G.level, 2) * 300 + G.coins * 1 + G.totalXP * 0.5);
}

function formatTime(secs) {
  if (secs <= 0) return 'Ready!';
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function canUnlockPlot(idx) {
  if (idx === 0) return true;
  return G.plots[idx - 1].harvestedCount >= 1;
}

// ============================================================
// GAME LOGIC
// ============================================================

// ============================================================
// BSV PRICE HELPERS
// 1 coin = 0.00001 BSV = 1,000 satoshis
// ============================================================
function coinsToSatoshis(coins) { return coins * 1000; }
function formatBSV(coins) {
  const bsv = coins * 0.00001;
  // Show up to 5 decimal places, trimming trailing zeros
  return bsv.toFixed(5).replace(/\.?0+$/, '') + ' BSV';
}

// SHOP: toggle the qty picker for a crop card
function toggleShopCard(cropId) {
  const crop = CROP_MAP[cropId];
  if (!crop) return;
  if (!isCropUnlocked(cropId)) {
    notify('🔒 Reach Level ' + crop.unlockLevel + ' to grow ' + crop.name + '!', 'error');
    return;
  }
  G.shopExpanded = (G.shopExpanded === cropId) ? null : cropId;
  renderShop();
}

// SHOP: stepper +/- buttons inside qty picker
function shopChangeQty(cropId, delta) {
  const el = document.getElementById('qty-val-' + cropId);
  if (!el) return;
  const crop = CROP_MAP[cropId];
  let val = parseInt(el.textContent) + delta;
  const maxAffordable = Math.max(1, Math.floor(G.coins / crop.seedCost));
  val = Math.max(1, Math.min(10, Math.min(val, maxAffordable)));
  el.textContent = val;
  const totalCoins = crop.seedCost * val;
  const totalEl = document.getElementById('qty-total-' + cropId);
  if (totalEl) totalEl.textContent = '🪙 ' + totalCoins;
  const bsvEl = document.getElementById('qty-bsv-' + cropId);
  if (bsvEl) bsvEl.textContent = formatBSV(totalCoins);
  const buyBtn = document.getElementById('buy-btn-' + cropId);
  if (buyBtn) buyBtn.disabled = G.coins < totalCoins;
  const bsvBtn = document.getElementById('bsv-btn-' + cropId);
  if (bsvBtn) bsvBtn.disabled = !G.walletConnected;
}

// SHOP: purchase seeds — coins deducted, seeds go to storage
function buySeeds(cropId, qty) {
  const crop = CROP_MAP[cropId];
  if (!crop || qty < 1 || qty > 10) return;
  const total = crop.seedCost * qty;
  if (G.coins < total) {
    notify('🪙 Need ' + total + ' coins for ' + qty + '× ' + crop.name + '!', 'error');
    shakeStat('stat-coins');
    return;
  }
  G.coins -= total;
  G.inventory[cropId] = (G.inventory[cropId] || 0) + qty;
  G.shopExpanded = null;
  saveGame();
  renderAll();
  notify('🛒 Bought ' + qty + '× ' + crop.name + ' seed' + (qty > 1 ? 's' : '') + '! Check storage.', 'unlock');
}

// SHOP: buy seeds with BSV
function buySeedsBSV(cropId, qty) {
  const crop = CROP_MAP[cropId];
  if (!crop || qty < 1 || qty > 10) return;
  if (!G.walletConnected) {
    notify('🔗 Connect your wallet first to pay with BSV!', 'error');
    return;
  }
  const totalCoins = crop.seedCost * qty;
  const satoshis = coinsToSatoshis(totalCoins);
  const ref = 'seeds-' + cropId + '-' + Date.now();
  const btn = document.getElementById('bsv-btn-' + cropId);
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Paying…'; }
  payWithBSV(satoshis, ref,
    () => {
      // Success
      G.inventory[cropId] = (G.inventory[cropId] || 0) + qty;
      G.shopExpanded = null;
      saveGame();
      renderAll();
      notify('₿ Paid ' + formatBSV(totalCoins) + ' — got ' + qty + '× ' + crop.name + '!', 'unlock');
    },
    (err) => {
      if (btn) { btn.disabled = false; btn.textContent = '₿ ' + formatBSV(totalCoins); }
      notify('₿ BSV payment failed: ' + err, 'error');
    }
  );
}

// STORAGE: click a seed tile to select it for planting
function clearSelectedCrop() {
  G.selectedCrop = null;
  renderPlots();
  renderStorage();
  renderShop();
}

function selectFromStorage(cropId) {
  if ((G.inventory[cropId] || 0) <= 0) return;
  G.selectedCrop = (G.selectedCrop === cropId) ? null : cropId;
  renderPlots();
  renderStorage();
}

// PLOTS: tap an empty plot to plant the selected seed from storage
function tryPlant(idx) {
  const plot = G.plots[idx];
  if (!plot.unlocked) { tryUnlockPlot(idx); return; }
  if (plot.cropId) return;

  if (!G.selectedCrop) {
    notify('🏒 Select a seed from storage below the farm first!', 'error');
    return;
  }
  const count = G.inventory[G.selectedCrop] || 0;
  if (count <= 0) {
    notify('🌱 No ' + CROP_MAP[G.selectedCrop].name + ' seeds left in storage!', 'error');
    G.selectedCrop = null;
    renderAll();
    return;
  }

  // Determine if this is a heritage seed (key ends in _heritage)
  const isHeritage = G.selectedCrop.endsWith('_heritage');
  const baseCropId = isHeritage ? G.selectedCrop.replace('_heritage', '') : G.selectedCrop;
  const crop = CROP_MAP[baseCropId];

  G.inventory[G.selectedCrop] = count - 1;
  if (G.inventory[G.selectedCrop] <= 0) delete G.inventory[G.selectedCrop];

  plot.cropId = baseCropId;
  plot.plantedAt = Date.now();
  plot.ready = false;
  plot.heritage = isHeritage;

  // Keep selection active if more seeds of this type remain
  if (!(G.inventory[G.selectedCrop] > 0)) G.selectedCrop = null;

  saveGame();
  renderAll();
  notify('🌱 Planted ' + (isHeritage ? '✨ Heritage ' : '') + crop.name + '! (' + formatTime(crop.gameSecs) + ')', 'harvest');
}

function tryUnlockPlot(idx) {
  if (G.plots[idx].unlocked) return;
  const cost = PLOT_COSTS[idx];
  if (!canUnlockPlot(idx)) {
    notify(`⚠️ Harvest from plot ${idx} first!`, 'error');
    return;
  }
  if (G.coins < cost) {
    notify(`🪙 Need ${cost} coins to unlock plot ${idx + 1}!`, 'error');
    shakeStat('stat-coins');
    return;
  }
  G.coins -= cost;
  G.plots[idx].unlocked = true;
  checkAchievements();
  saveGame();
  renderAll();
  notify(`🔓 Plot ${idx + 1} unlocked!`, 'unlock');
}

function unlockPlotBSV(idx) {
  if (G.plots[idx].unlocked) return;
  const cost = PLOT_COSTS[idx];
  if (!canUnlockPlot(idx)) {
    notify(`⚠️ Harvest from plot ${idx} first!`, 'error');
    return;
  }
  if (!G.walletConnected) {
    notify('🔗 Connect your wallet first to pay with BSV!', 'error');
    return;
  }
  const satoshis = coinsToSatoshis(cost);
  const ref = 'plot-' + idx + '-' + Date.now();
  notify(`₿ Requesting BSV payment for Plot ${idx + 1}…`, 'harvest');
  payWithBSV(satoshis, ref,
    () => {
      G.plots[idx].unlocked = true;
      checkAchievements();
      saveGame();
      renderAll();
      notify(`🔓 Plot ${idx + 1} unlocked with BSV!`, 'unlock');
    },
    (err) => {
      notify('₿ BSV payment failed: ' + err, 'error');
    }
  );
}

// ============================================================
// EXOTIC SEED-SAVING
// ============================================================

// 45% of grow time for seed maturation phase
const SEED_PHASE_RATIO = 0.45;

// Returns plots in seed-saving mode with elapsed fraction, sorted oldest-first
function getSeedingPlotsInfo() {
  const now = Date.now();
  return G.plots
    .filter(p => p.seeding && p.seedingStartedAt && p.seedingDuration)
    .map(p => ({
      plot: p,
      elapsed: (now - p.seedingStartedAt) / p.seedingDuration,
    }))
    .sort((a, b) => b.elapsed - a.elapsed); // highest fraction first = oldest
}

// Plots past the 50% grace window — eligible for mishap loss
function getSeedingPlotsAtRisk() {
  return getSeedingPlotsInfo().filter(info => info.elapsed >= 0.5);
}

// The single most-at-risk plot (highest elapsed fraction beyond 50%)
function getOldestSeedingPlot() {
  const atRisk = getSeedingPlotsAtRisk();
  return atRisk.length > 0 ? atRisk[0].plot : null;
}

// Called when farmer chooses "Let Go to Seed" on a ready exotic plot
function startSeedSaving(idx) {
  const plot = G.plots[idx];
  const crop = CROP_MAP[plot.cropId];
  if (!crop || !crop.exotic || !plot.ready) return;

  plot.ready = false;
  plot.seeding = true;
  plot.seedingStartedAt = Date.now();
  plot.seedingDuration = Math.round(crop.gameSecs * SEED_PHASE_RATIO * 1000);
  plot.seedReady = false;

  // Close the harvest-fork overlay — must use .remove() because the overlay
  // was created with display:flex as an inline style; classList cannot override it.
  const overlay = document.getElementById('harvest-fork-overlay');
  if (overlay) overlay.remove();

  saveGame();
  renderPlots();
  notify(`🌱 ${crop.name} is going to seed… check back in ${formatTime(Math.round(crop.gameSecs * SEED_PHASE_RATIO))}`, 'harvest');
}

// Collect seeds from a ready seed-saving plot
function collectSeeds(idx) {
  const plot = G.plots[idx];
  const crop = CROP_MAP[plot.cropId];
  if (!plot.seedReady || !crop) return;

  // Roll yield: 45% = 1 seed, 45% = 2 seeds, 10% = 3 seeds
  const roll = Math.random();
  let qty = roll < 0.45 ? 1 : roll < 0.90 ? 2 : 3;

  // Heritage check: 10% chance
  const isHeritage = Math.random() < 0.10;
  const inventoryKey = isHeritage ? crop.id + '_heritage' : crop.id;

  G.inventory[inventoryKey] = (G.inventory[inventoryKey] || 0) + qty;
  G.seedsCollectedTotal = (G.seedsCollectedTotal || 0) + 1;
  if (isHeritage) G._heritageCollected = (G._heritageCollected || 0) + 1;

  // Reset plot
  plot.cropId = null;
  plot.plantedAt = null;
  plot.ready = false;
  plot.seeding = false;
  plot.seedingStartedAt = null;
  plot.seedingDuration = null;
  plot.seedReady = false;
  plot.fertilised = false;
  plot.heritage = false;

  checkAchievements();
  saveGame();
  renderAll();

  const heritageMsg = isHeritage ? ' ✨ Heritage seed!' : '';
  const bumperMsg = qty === 3 ? ' Bumper crop!' : '';
  notify(`🌱 Collected ${qty}× ${crop.name} seed${qty !== 1 ? 's' : ''}!${bumperMsg}${heritageMsg}`, 'levelup');
}

// Called from tick() — advances seed phase, marks ready when done
function tickSeedSaving() {
  const now = Date.now();
  let changed = false;
  G.plots.forEach(plot => {
    if (plot.seeding && !plot.seedReady && plot.seedingStartedAt && plot.seedingDuration) {
      if ((now - plot.seedingStartedAt) >= plot.seedingDuration) {
        plot.seedReady = true;
        changed = true;
        const crop = CROP_MAP[plot.cropId];
        notify(`🌱 ${crop ? crop.name : 'Exotic'} seeds are ready to collect!`, 'harvest');
      }
    }
  });
  if (changed) { saveGame(); renderPlots(); }
}

// Mishap: destroy the single oldest at-risk seeding plot's seeds
function applyMishapPartial() {
  const plot = getOldestSeedingPlot();
  if (!plot) return;
  const crop = CROP_MAP[plot.cropId];
  const name = crop ? crop.name : 'Exotic crop';
  plot.cropId = null;
  plot.plantedAt = null;
  plot.ready = false;
  plot.seeding = false;
  plot.seedingStartedAt = null;
  plot.seedingDuration = null;
  plot.seedReady = false;
  plot.fertilised = false;
  plot.heritage = false;
  G.exoticMishapsTotal = (G.exoticMishapsTotal || 0) + 1;
  saveGame();
  renderAll();
  notify(`💔 Lost the ${name} seeds to the mishap!`, 'error');
}

// Mishap: destroy all at-risk seeding plots (elapsed > 50%)
function applyMishapTotal() {
  const atRisk = getSeedingPlotsAtRisk().map(info => info.plot);
  const names = [];
  atRisk.forEach(plot => {
    const crop = CROP_MAP[plot.cropId];
    if (crop) names.push(crop.name);
    plot.cropId = null;
    plot.plantedAt = null;
    plot.ready = false;
    plot.seeding = false;
    plot.seedingStartedAt = null;
    plot.seedingDuration = null;
    plot.seedReady = false;
    plot.fertilised = false;
    plot.heritage = false;
    G.exoticMishapsTotal = (G.exoticMishapsTotal || 0) + 1;
  });
  saveGame();
  renderAll();
  if (names.length > 0) notify(`💔 Lost all seeding plots to the mishap: ${names.join(', ')}!`, 'error');
}

function harvestCrop(idx) {
  const plot = G.plots[idx];
  if (!plot.ready) {
    // Close any stale overlay that might still be showing
    const stale = document.getElementById('harvest-fork-overlay');
    if (stale) stale.remove();
    return;
  }
  const crop = CROP_MAP[plot.cropId];

  const baseSell = Math.floor(crop.sellPrice * prestigeMultiplier() * (plot.fertilised ? 1.25 : 1) * (plot.heritage ? 1.20 : 1));
  const earnedCoins = applyEventModifiers(baseSell);
  const wasFertilised = plot.fertilised;
  G.coins += earnedCoins;
  G.totalXP += crop.xp;
  plot.harvestedCount++;
  // Lifetime tracking (survives prestige)
  G.cropHarvests[crop.id] = (G.cropHarvests[crop.id] || 0) + 1;
  G.totalHarvestCount++;
  G.totalCoinsEarned += earnedCoins;
  const prevLevel = G.level;
  checkLevelUp();
  checkAchievements();
  plot.cropId = null;
  plot.plantedAt = null;
  plot.ready = false;
  plot.fertilised = false;
  plot.heritage = false;
  saveGame();
  renderAll();

  showFloatLabel(`+🪙${earnedCoins}`, idx);
  notify(`✨ Harvested ${crop.name}! +🪙${earnedCoins}${wasFertilised ? ' 🌿+25%' : ''} +${crop.xp}XP`, 'harvest');

  if (G.level > prevLevel) {
    const ld = getLevelData(G.level);
    setTimeout(() => notify(`🎉 Level Up! You're now ${ld.title} (Lv${G.level})!`, 'levelup'), 300);
    if (ld.unlocks.length > 0) {
      setTimeout(() => notify(`🆕 Unlocked: ${ld.unlocks.map(id => CROP_MAP[id].name).join(', ')}!`, 'unlock'), 700);
    }
  }
}

function checkLevelUp() {
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (G.totalXP >= LEVELS[i].xpMin) {
      G.level = LEVELS[i].lvl;
      return;
    }
  }
  G.level = 1;
}

// ============================================================
// WATERING CAN
// ============================================================
const WATERING_CAN_CHARGE_SECS = 120; // 2 minutes to fully charge

function wateringCanCharge() {
  if (G.wateringCanLastUsed === 0) return 1; // never used = starts full
  const elapsed = (Date.now() - G.wateringCanLastUsed) / 1000;
  return Math.min(elapsed / WATERING_CAN_CHARGE_SECS, 1);
}

function useWateringCan() {
  const charge = wateringCanCharge();
  if (charge < 1) {
    const secsLeft = Math.ceil(WATERING_CAN_CHARGE_SECS * (1 - charge));
    notify('💧 Watering can still filling! Ready in ' + formatTime(secsLeft), 'error');
    return;
  }
  const growing = G.plots.filter(p => p.cropId && p.plantedAt && !p.ready);
  if (growing.length === 0) {
    notify('🌵 No growing crops to water!', 'error');
    return;
  }
  growing.forEach(p => {
    const crop = CROP_MAP[p.cropId];
    const elapsed = Date.now() - p.plantedAt;
    const remaining = Math.max(0, crop.gameSecs * 1000 - elapsed);
    p.plantedAt -= Math.floor(remaining * 0.10);
  });
  G.wateringCanLastUsed = Date.now();
  saveGame();
  renderPlots();
  renderWateringCan();
  // Splash animation
  const btn = document.getElementById('watering-can-btn');
  if (btn) {
    btn.classList.add('can-splashing');
    setTimeout(() => btn.classList.remove('can-splashing'), 500);
  }
  notify('💧 Watered ' + growing.length + ' crop' + (growing.length !== 1 ? 's' : '') + '! −10% grow time each.', 'harvest');
}

function wateringCanSVG(charge) {
  // Fill level: the water inside the can reflects charge (0–1)
  const waterColor = charge >= 1 ? '#29B6F6' : charge > 0.3 ? '#4FC3F7' : '#78909C';
  const waterOpacity = 0.3 + charge * 0.5;
  // Can body dims (within 56x56 viewport)
  return `<svg width="56" height="56" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
    <!-- Handle -->
    <path d="M38 14 Q50 14 50 24 Q50 34 38 34" fill="none" stroke="#78909C" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Spout -->
    <path d="M10 26 Q4 26 3 21 L8 18 Q10 22 14 22" fill="#607D8B" stroke="#546E7A" stroke-width="1"/>
    <!-- Water drops from spout (visible when full) -->
    ${charge >= 1 ? `
    <circle cx="1" cy="25" r="1.5" fill="#29B6F6" opacity="0.9"/>
    <circle cx="0" cy="30" r="1.2" fill="#4FC3F7" opacity="0.7"/>
    <circle cx="2" cy="34" r="1" fill="#4FC3F7" opacity="0.5"/>` : ''}
    <!-- Can body -->
    <rect x="11" y="18" width="27" height="24" rx="4" fill="#546E7A" stroke="#455A64" stroke-width="1.5"/>
    <!-- Water fill inside body -->
    <clipPath id="can-clip">
      <rect x="12" y="19" width="25" height="22" rx="3"/>
    </clipPath>
    <rect x="12" y="${19 + 22 * (1 - charge)}" width="25" height="${22 * charge}" fill="${waterColor}" opacity="${waterOpacity}" clip-path="url(#can-clip)"/>
    <!-- Shine -->
    <rect x="14" y="20" width="5" height="10" rx="2.5" fill="white" opacity="0.12"/>
    <!-- Rose / sprinkle head -->
    <rect x="10" y="22" width="5" height="8" rx="2" fill="#78909C" stroke="#607D8B" stroke-width="1"/>
    <circle cx="11" cy="24" r="0.8" fill="#B0BEC5"/>
    <circle cx="13" cy="24" r="0.8" fill="#B0BEC5"/>
    <circle cx="11" cy="27" r="0.8" fill="#B0BEC5"/>
    <circle cx="13" cy="27" r="0.8" fill="#B0BEC5"/>
    <!-- Lid -->
    <rect x="11" y="17" width="27" height="4" rx="2" fill="#607D8B" stroke="#546E7A" stroke-width="1"/>
  </svg>`;
}

function renderWateringCan() {
  const btn = document.getElementById('watering-can-btn');
  const fill = document.getElementById('watering-can-bar-fill');
  const status = document.getElementById('watering-can-status');
  if (!btn || !fill || !status) return;

  const charge = wateringCanCharge();
  const isFull = charge >= 1;
  const hasGrowing = G.plots.some(p => p.cropId && p.plantedAt && !p.ready);

  btn.innerHTML = wateringCanSVG(charge);
  btn.disabled = !isFull || !hasGrowing;
  btn.title = isFull
    ? (hasGrowing ? 'Click to water crops (−10% grow time)' : 'No growing crops to water')
    : 'Filling… click when full';

  fill.style.width = (charge * 100).toFixed(1) + '%';
  fill.classList.toggle('full', isFull);

  if (isFull) {
    status.textContent = hasGrowing ? '🚿 Ready! Click to water all crops' : '🪣 Full — plant something first';
    status.style.color = hasGrowing ? 'var(--green-hi)' : 'var(--text-dim)';
  } else {
    const secsLeft = Math.ceil(WATERING_CAN_CHARGE_SECS * (1 - charge));
    status.textContent = '💧 Filling… ' + formatTime(secsLeft) + ' remaining';
    status.style.color = 'var(--text-dim)';
  }
}

// ============================================================
// COMPOST PILE
// ============================================================
const COMPOST_MAX_CHARGES  = 5;
const COMPOST_CHARGE_SECS  = 4 * 60; // 4 minutes per charge

function tickCompost() {
  if (G.compostCharges >= COMPOST_MAX_CHARGES) return;
  const now = Date.now();
  // initialise timer on first tick after use
  if (G.compostLastCharged === 0) { G.compostLastCharged = now; return; }
  const elapsed = (now - G.compostLastCharged) / 1000;
  if (elapsed >= COMPOST_CHARGE_SECS) {
    G.compostCharges = Math.min(G.compostCharges + 1, COMPOST_MAX_CHARGES);
    G.compostLastCharged = now;
    saveGame();
    if (G.compostCharges === COMPOST_MAX_CHARGES) {
      notify('🌿 Compost pile fully charged! 5 fertiliser charges ready.', 'unlock');
    }
  }
}

function compostNextChargeSecs() {
  if (G.compostCharges >= COMPOST_MAX_CHARGES) return 0;
  if (G.compostLastCharged === 0) return COMPOST_CHARGE_SECS;
  const elapsed = (Date.now() - G.compostLastCharged) / 1000;
  return Math.max(0, COMPOST_CHARGE_SECS - elapsed);
}

function toggleFertiliseMode() {
  if (G.compostCharges <= 0) {
    notify('🌿 No compost charges! Wait for the pile to regenerate.', 'error');
    return;
  }
  G.fertiliseMode = !G.fertiliseMode;
  renderPlots();
  renderCompost();
}

function applyFertiliser(idx) {
  const plot = G.plots[idx];
  if (!plot.unlocked) { notify('🔒 Unlock this plot first!', 'error'); return; }
  if (G.compostCharges <= 0) { notify('🌿 No compost charges left!', 'error'); G.fertiliseMode = false; renderPlots(); renderCompost(); return; }
  if (plot.fertilised) { notify('🌿 Plot already fertilised!', 'error'); return; }
  if (plot.ready)      { notify('🌿 Harvest first — fertiliser applies before harvest!', 'error'); return; }

  plot.fertilised = true;
  G.compostCharges = Math.max(0, G.compostCharges - 1);
  if (G.compostCharges < COMPOST_MAX_CHARGES && G.compostLastCharged === 0) {
    G.compostLastCharged = Date.now();
  }
  G.fertiliseMode = false;
  saveGame();
  renderPlots();
  renderCompost();
  notify('🌿 Plot ' + (idx + 1) + ' fertilised! Next harvest +25% coins.', 'harvest');
}

function compostPileSVG(charges) {

  const pileColor  = pct >= 0.8 ? '#6D4C41' : pct >= 0.4 ? '#5D4037' : '#4E342E';
  const steamColor = pct >= 0.6 ? 'rgba(139,195,74,0.6)' : 'rgba(180,180,180,0.3)';
  return `<svg width="56" height="56" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">

    <rect x="10" y="22" width="36" height="26" rx="4" fill="${pileColor}" stroke="#3E2723" stroke-width="1.5"/>
    <!-- Bin slats -->
    <line x1="19" y1="22" x2="19" y2="48" stroke="#3E2723" stroke-width="1" opacity="0.5"/>
    <line x1="28" y1="22" x2="28" y2="48" stroke="#3E2723" stroke-width="1" opacity="0.5"/>
    <line x1="37" y1="22" x2="37" y2="48" stroke="#3E2723" stroke-width="1" opacity="0.5"/>
    <!-- Contents / fill level -->
    ${charges > 0 ? `<rect x="11" y="${48 - Math.round(24 * pct)}" width="34" height="${Math.round(24 * pct)}" rx="3"
      fill="#558B2F" opacity="0.55" clip-path="url(#bin-clip)"/>` : ''}
    <clipPath id="bin-clip"><rect x="11" y="23" width="34" height="24" rx="3"/></clipPath>
    <!-- Lid -->
    <rect x="8" y="18" width="40" height="7" rx="3" fill="#4E342E" stroke="#3E2723" stroke-width="1.5"/>
    <rect x="20" y="15" width="16" height="5" rx="2.5" fill="#4E342E" stroke="#3E2723" stroke-width="1"/>
    <!-- Steam wisps when charged -->
    ${pct >= 0.4 ? `<path d="M20 15 Q18 11 20 8 Q22 5 20 2" fill="none" stroke="${steamColor}" stroke-width="1.5" stroke-linecap="round"/>` : ''}
    ${pct >= 0.6 ? `<path d="M28 14 Q26 10 28 7 Q30 4 28 1" fill="none" stroke="${steamColor}" stroke-width="1.5" stroke-linecap="round"/>` : ''}
    ${pct >= 0.8 ? `<path d="M36 15 Q34 11 36 8 Q38 5 36 2" fill="none" stroke="${steamColor}" stroke-width="1.5" stroke-linecap="round"/>` : ''}
    <!-- Leaf decoration -->
    <ellipse cx="16" cy="25" rx="4" ry="2.5" fill="#8BC34A" opacity="${0.3 + pct * 0.5}" transform="rotate(-20 16 25)"/>
    <ellipse cx="40" cy="26" rx="3.5" ry="2" fill="#7CB342" opacity="${0.2 + pct * 0.4}" transform="rotate(15 40 26)"/>
  </svg>`;
}

function renderCompost() {
  const btn    = document.getElementById('compost-btn');
  const status = document.getElementById('compost-status');
  const pips   = document.getElementById('compost-pips');
  if (!btn || !status || !pips) return;

  btn.innerHTML = compostPileSVG(G.compostCharges);

  const hasCharges = G.compostCharges > 0;
  btn.disabled = !hasCharges;
  btn.title = G.fertiliseMode
    ? 'Click a plot to fertilise it (or click here to cancel)'
    : hasCharges ? 'Click to enter fertilise mode — then tap a plot (+25% sell)'
                 : 'Recharging… wait for compost to be ready';

  // Charge pips
  pips.innerHTML = Array.from({length: COMPOST_MAX_CHARGES}, (_, i) =>
    `<div class="compost-pip ${i < G.compostCharges ? 'filled' : ''}" title="${i < G.compostCharges ? 'Charge available' : 'Recharging'}"></div>`
  ).join('');

  if (G.fertiliseMode) {
    status.textContent = '🌿 Select a plot to fertilise!';
    status.style.color = '#8BC34A';
  } else if (hasCharges) {
    const secsLeft = compostNextChargeSecs();
    const nextInfo = G.compostCharges < COMPOST_MAX_CHARGES
      ? ' (next in ' + formatTime(secsLeft) + ')' : '';
    status.textContent = G.compostCharges + '/' + COMPOST_MAX_CHARGES + ' charges' + nextInfo;
    status.style.color = 'var(--green-hi)';
  } else {
    const secsLeft = compostNextChargeSecs();
    status.textContent = '⏳ Recharging… ' + formatTime(secsLeft);
    status.style.color = 'var(--text-dim)';
  }
}

// ============================================================
// TICK — runs every second
// ============================================================
function tick() {
  try {
    let changed = false;
    const now = Date.now();
    G.plots.forEach(plot => {
      if (plot.cropId && plot.plantedAt && !plot.ready && !plot.seeding) {
        const crop = CROP_MAP[plot.cropId];
        if (crop && (now - plot.plantedAt) >= crop.gameSecs * 1000) {
          plot.ready = true;
          changed = true;
          notify(`✨ ${crop.name} is ready to harvest!`, 'harvest');
        }
      }
    });
    checkRandomEvent();
    checkMerchant();
    tickCompost();
    tickSeedSaving();
    renderStats();
    renderWateringCan();
    renderCompost();
    if (changed) {
      saveGame();
      renderPlots();
      renderStorage();
      renderShop();
    } else {
      renderPlotsOnly();
    }
  } catch(e) {
    console.error('Game tick error:', e);
    // Continue running - don't crash the game
    notify('⚠️ Game encountered an error but is still running.', 'error');
  }
}

// RENDERING
// ============================================================
function renderAll() {
  renderStats();
  renderHeading();
  renderPlots();
  renderStorage();
  renderShop();
  renderWateringCan();
  renderCompost();
  if (MARKETPLACE_ENABLED) renderVegeStand();

}

function renderStats() {
  const ld = getCurrentLevel();
  const nextLd = LEVELS[Math.min(G.level, LEVELS.length - 1)];
  const xpInLevel = G.totalXP - ld.xpMin;
  const xpNeeded = ld.xpMax - ld.xpMin;
  const xpPct = Math.min((xpInLevel / xpNeeded) * 100, 100);

  document.getElementById('stat-coins').textContent = G.coins;
  document.getElementById('stat-level').textContent = G.level;
  document.getElementById('stat-level-title').textContent = ld.title;
  document.getElementById('stat-xp').textContent = G.totalXP;
  document.getElementById('stat-xp-max').textContent = ld.xpMax;
  document.getElementById('xp-fill').style.width = xpPct + '%';
  document.getElementById('stat-score').textContent = calcFarmScore();

  // Prestige pill
  const pp = document.getElementById('prestige-pill');
  if (pp) {
    const p = G.prestige;
    if (p > 0 || G.level >= 10) {
      pp.style.display = 'flex';
      const starsEl = document.getElementById('prestige-stars');
      const bonusEl = document.getElementById('prestige-bonus');
      // Stars: filled star per prestige, show up to 5 then show number
      let starStr = '';
      if (p === 0) {
        starStr = '⭐ Prestige';
      } else if (p <= 10) {
        starStr = '⭐'.repeat(p);
      } else {
        starStr = '⭐×' + p;
      }
      if (starsEl) starsEl.textContent = starStr;
      if (bonusEl) bonusEl.textContent = p > 0 ? '+' + (p*10) + '%' : '';
      pp.className = 'prestige-pill';
      if (p >= 50) pp.classList.add('max');
      if (G.level >= 10 && p < 50) pp.classList.add('prestige-ready');
    } else {
      pp.style.display = 'none';
    }
  }

  // BSV status
  const bsvStatus = document.getElementById('bsv-status');
  const bsvBtn = document.querySelector('#bsv-pill button');
  if (G.walletConnected) {
    bsvStatus.textContent = '₿ ' + G.walletAddress.substring(0,10) + '…';
    if (bsvBtn) {
      bsvBtn.textContent = 'Connected ✓';
      bsvBtn.style.background = 'var(--green-hi)';
      bsvBtn.style.color = '#0A1F06';
      bsvBtn.disabled = false;
      bsvBtn.title = 'Click to disconnect wallet';
      bsvBtn.onclick = disconnectWallet;
    }
  } else {
    bsvStatus.textContent = 'Wallet: Local Mode';
    if (bsvBtn) {
      bsvBtn.textContent = 'Connect';
      bsvBtn.style.background = '';
      bsvBtn.style.color = '';
      bsvBtn.disabled = false;
      bsvBtn.title = '';
      bsvBtn.onclick = connectWallet;
    }
  }
}

function renderPlotsOnly() {
  const grid = document.getElementById('plots-grid');
  if (!grid) return;
  const now = Date.now();
  G.plots.forEach((plot, idx) => {
    const tile = grid.querySelector(`[data-idx="${idx}"]`);
    if (!tile) return;
    if (plot.cropId && !plot.ready && plot.plantedAt && !plot.seeding) {
      const crop = CROP_MAP[plot.cropId];
      const elapsed = now - plot.plantedAt;
      const progress = Math.min(elapsed / (crop.gameSecs * 1000), 1);
      const remaining = Math.max(crop.gameSecs - elapsed/1000, 0);
      const scale = 0.2 + progress * 0.6;
      const opacity = 0.4 + progress * 0.6;

      const artEl = tile.querySelector('.crop-art');
      if (artEl) {
        artEl.style.transform = `scale(${scale.toFixed(3)}) translateY(${(-(scale*8)).toFixed(1)}px)`;
        artEl.style.opacity = opacity.toFixed(3);
      }

      // Update progress ring
      const ringFill = tile.querySelector('.progress-ring-fill');
      if (ringFill) {
        const r = 44;
        const circ = 2 * Math.PI * r;
        ringFill.setAttribute('stroke-dashoffset', (circ * (1 - progress)).toFixed(2));
      }

      // Footer time
      const footer = tile.querySelector('.plot-footer');
      if (footer) footer.textContent = `${crop.name} — ${formatTime(remaining)}`;
    }
  });
}

            <button onclick="unlockPlotBSV(${idx})" style="flex:1;background:${G.walletConnected?'rgba(200,134,10,0.2)':'rgba(100,100,100,0.1)'};border:1px solid ${G.walletConnected?'rgba(200,134,10,0.5)':'rgba(100,100,100,0.2)'};border-radius:6px;padding:3px 4px;font-size:9px;font-weight:800;color:${G.walletConnected?'#F5A623':'#666'};cursor:${G.walletConnected?'pointer':'not-allowed'}" ${G.walletConnected?'':'disabled'} title="${G.walletConnected?'Pay with BSV':'Connect wallet'}">₿ ${bsvCost}</button>
          </div>` : ''}
