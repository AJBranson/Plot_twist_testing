      </div>`;
    }

    // EMPTY
    if (!plot.cropId) {
      const isTarget = G.selectedCrop !== null && (G.inventory[G.selectedCrop] || 0) > 0;
      const isFertTarget = G.fertiliseMode && !plot.fertilised;
      let overlayContent = '';
      if (isTarget) {
        overlayContent = `<div style="opacity:0.55;transform:scale(0.7)">${makeCropCardSVG(G.selectedCrop, 50, 50)}</div>`;
      } else if (isFertTarget) {
        overlayContent = `<span style="font-size:22px">🌿</span>`;
      } else {
        overlayContent = `<span class="plus-sign">+</span>`;
      }
      const fertBadge = plot.fertilised ? `<div class="plot-fertilised-badge">🌿 +25%</div>` : '';
      const clickHandler = G.fertiliseMode ? `applyFertiliser(${idx})` : `tryPlant(${idx})`;
      return `<div class="plot-tile empty ${isTarget?'plant-target':''} ${isFertTarget?'fertilise-target':''}" data-idx="${idx}" onclick="${clickHandler}">
        <div class="plot-visual">
          <div class="plot-soil-bg">${soilSVG('100%','100%')}</div>
          <div class="plot-overlay">${overlayContent}</div>
          ${fertBadge}
        </div>
        <div class="plot-footer">Plot ${idx+1} — ${isFertTarget ? 'Tap to fertilise' : isTarget ? 'Tap to plant' : 'Empty'}</div>
      </div>`;
    }

    const crop = CROP_MAP[plot.cropId];

    // READY — exotic crops show a fork; regular crops harvest directly
    if (plot.ready) {
      const fertBadge = plot.fertilised ? `<div class="plot-fertilised-badge">🌿 +25%</div>` : '';
      const displayPrice = Math.floor(crop.sellPrice * prestigeMultiplier() * (plot.fertilised ? 1.25 : 1));
      const isExotic = crop.exotic;
      if (isExotic) {
        const theme = CROP_THEME[crop.id] || { bg:'#1A1A1A', border:'rgba(255,215,0,0.4)' };
        return `<div class="plot-tile ready exotic-ready" data-idx="${idx}" onclick="showHarvestFork(${idx})">
          <div class="plot-visual" style="box-shadow:0 0 14px rgba(255,215,0,0.25)">
            <div class="plot-soil-bg">${soilSVG('100%','100%')}</div>
            <div class="plot-overlay" style="display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px">
              <svg width="52" height="52" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 6px rgba(255,215,0,0.5))">${cropArt(plot.cropId)}</svg>
            </div>
            <div style="position:absolute;top:4px;right:4px;font-size:11px">✨</div>
            ${fertBadge}
          </div>
          <div class="plot-footer"><span style="color:#FFD700;font-weight:800;font-size:11px">✨ Harvest or Seed?</span></div>
        </div>`;
      }
      return `<div class="plot-tile ready" data-idx="${idx}" onclick="harvestCrop(${idx})">
        <div class="plot-visual">
          <div class="plot-soil-bg">${soilSVG('100%','100%')}</div>
          <div class="plot-overlay" style="display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px">
            <svg width="52" height="52" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">${cropArt(plot.cropId)}</svg>
          </div>
          ${fertBadge}
        </div>
        <div class="plot-footer"><span class="footer-harvest">✨ Harvest! +🪙${displayPrice}</span></div>
      </div>`;
    }

    // SEEDING — exotic crop going to seed
    if (plot.seeding) {
      const crop2 = CROP_MAP[plot.cropId];
      const theme = CROP_THEME[plot.cropId] || { bg:'#1A1A1A', border:'rgba(255,215,0,0.4)' };
      const now2 = Date.now();
      const elapsedFrac = plot.seedingDuration
        ? Math.min((now2 - plot.seedingStartedAt) / plot.seedingDuration, 1)
        : 0;
      const remaining2 = plot.seedingDuration
        ? Math.max((plot.seedingDuration - (now2 - plot.seedingStartedAt)) / 1000, 0)
        : 0;
      const atRisk = elapsedFrac >= 0.5;
      const r2 = 44;
      const circ2 = 2 * Math.PI * r2;
      const offset2 = circ2 * (1 - elapsedFrac);
      const ringColour = plot.seedReady ? '#FFD700' : atRisk ? '#FF8C00' : '#A78BFA';

      if (plot.seedReady) {
        return `<div class="plot-tile seeding seed-ready" data-idx="${idx}" onclick="collectSeeds(${idx})">
          <div class="plot-visual" style="box-shadow:0 0 12px rgba(255,215,0,0.3)">
            <div class="plot-soil-bg">${soilSVG('100%','100%')}</div>
            <div class="plot-overlay" style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px">
              <div style="font-size:28px;filter:drop-shadow(0 0 6px gold)">🌱</div>
              <div style="font-size:9px;color:#FFD700;font-weight:800;text-align:center">Seeds Ready!</div>
            </div>
            <svg class="progress-ring-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <circle class="progress-ring-bg" cx="50" cy="50" r="${r2}" stroke-width="5"/>
              <circle class="progress-ring-fill" cx="50" cy="50" r="${r2}" stroke-width="5" stroke="${ringColour}" stroke-dasharray="${circ2.toFixed(2)}" stroke-dashoffset="0"/>
            </svg>
          </div>
          <div class="plot-footer" style="color:#FFD700;font-weight:800;font-size:11px">🌱 Tap to collect seeds</div>
        </div>`;
      }

      const warnIcon = atRisk ? '<span title="At risk from mishap events" style="position:absolute;top:4px;right:4px;font-size:11px">⚠️</span>' : '';
      const footerText = elapsedFrac < 0.5
        ? `Going to seed… ${formatTime(remaining2)}`
        : `Seeding ⚠️ ${formatTime(remaining2)}`;
      return `<div class="plot-tile seeding" data-idx="${idx}">
        <div class="plot-visual">
          <div class="plot-soil-bg">${soilSVG('100%','100%')}</div>
          <div class="plot-overlay" style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px">
            <div style="opacity:0.5;transform:scale(0.7) translateY(4px)">
              <svg width="52" height="52" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" style="filter:grayscale(60%)">${cropArt(plot.cropId)}</svg>
            </div>
            <div style="font-size:9px;color:${atRisk ? '#FF8C00' : '#A78BFA'};font-weight:700">${atRisk ? '⚠️ At risk' : '🌱 Seeding…'}</div>
          </div>
          <svg class="progress-ring-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle class="progress-ring-bg" cx="50" cy="50" r="${r2}" stroke-width="5"/>
            <circle class="progress-ring-fill" cx="50" cy="50" r="${r2}" stroke-width="5" stroke="${ringColour}" stroke-dasharray="${circ2.toFixed(2)}" stroke-dashoffset="${offset2.toFixed(2)}"/>
          </svg>
          ${warnIcon}
        </div>
        <div class="plot-footer" style="font-size:10px;color:${atRisk ? '#FF8C00' : 'var(--text-dim)'}">${footerText}</div>
      </div>`;
    }

    // GROWING
    const elapsed = now - plot.plantedAt;
    const progress = Math.min(elapsed / (crop.gameSecs * 1000), 1);
    const remaining = Math.max(crop.gameSecs - elapsed/1000, 0);
    const scale = 0.2 + progress * 0.6;
    const opacity = 0.4 + progress * 0.6;
    const r = 44;
    const circ = 2 * Math.PI * r;
    const offset = circ * (1 - progress);
    const fertBadge = plot.fertilised ? `<div class="plot-fertilised-badge">🌿 +25%</div>` : '';
    const isFertTarget = G.fertiliseMode && !plot.fertilised;
    const clickHandler = G.fertiliseMode ? `applyFertiliser(${idx})` : '';

    return `<div class="plot-tile growing ${isFertTarget ? 'fertilise-target' : ''}" data-idx="${idx}" ${clickHandler ? `onclick="${clickHandler}"` : ''}>
      <div class="plot-visual">
        <div class="plot-soil-bg">${soilSVG('100%','100%')}</div>
        <div class="plot-overlay" style="display:flex;align-items:center;justify-content:center;overflow:hidden">
          <div class="crop-art" style="transform:scale(${scale.toFixed(3)}) translateY(${(-(scale*8)).toFixed(1)}px);opacity:${opacity.toFixed(3)};transform-origin:center center">
            <svg width="52" height="52" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">${cropArt(plot.cropId)}</svg>
          </div>
        </div>
        <svg class="progress-ring-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle class="progress-ring-bg" cx="50" cy="50" r="${r}" stroke-width="5"/>
          <circle class="progress-ring-fill" cx="50" cy="50" r="${r}"
            stroke-width="5"
            stroke-dasharray="${circ.toFixed(2)}"
            stroke-dashoffset="${offset.toFixed(2)}"/>
        </svg>
        ${fertBadge}
      </div>
      <div class="plot-footer">${isFertTarget ? '🌿 Tap to fertilise' : `${crop.name} — ${formatTime(remaining)}`}</div>
    </div>`;
  }).join('');
}

function renderStorage() {
  const grid = document.getElementById('storage-grid');
  const badge = document.getElementById('storage-count-badge');
  if (!grid) return;

  const entries = Object.entries(G.inventory).filter(([,qty]) => qty > 0);
  // Sort by crop order (regular crops first in their order, then exotic)
  entries.sort((a, b) => {
    const ai = CROPS.findIndex(c => c.id === a[0]);
    const bi = CROPS.findIndex(c => c.id === b[0]);
    const aei = EXOTIC_CROPS.findIndex(c => c.id === a[0]);
    const bei = EXOTIC_CROPS.findIndex(c => c.id === b[0]);
    const aIdx = ai >= 0 ? ai : 1000 + aei;
    const bIdx = bi >= 0 ? bi : 1000 + bei;
    return aIdx - bIdx;
  });

  if (badge) {
    if (entries.length === 0) {
      badge.textContent = 'empty';
    } else {
      const total = entries.reduce((s, [,q]) => s + q, 0);
      badge.textContent = entries.length + ' type' + (entries.length !== 1 ? 's' : '') + ', ' + total + ' seed' + (total !== 1 ? 's' : '');
    }
  }

  if (entries.length === 0) {
    grid.innerHTML = '<div class="storage-empty">No seeds yet — buy some from the shop →</div>';
    return;
  }

  grid.innerHTML = entries.map(([cropId, qty]) => {
    const isHeritage = cropId.endsWith('_heritage');
    const baseCropId = isHeritage ? cropId.replace('_heritage', '') : cropId;
    const crop = CROP_MAP[baseCropId];
    if (!crop) return '';
    const theme = CROP_THEME[baseCropId] || { bg: '#1A1A1A' };
    const selected = G.selectedCrop === cropId;
    const isExotic = crop.exotic;
    const tileStyle = isHeritage
      ? `background:${theme.bg};box-shadow:0 0 10px rgba(255,215,0,0.5),inset 0 0 6px rgba(255,215,0,0.12)`
      : isExotic
        ? `background:${theme.bg};box-shadow:0 0 8px ${theme.border},inset 0 0 4px rgba(255,215,0,0.08)`
        : `background:${theme.bg}`;
    const nameStyle = isHeritage ? 'color:#FFD700;font-weight:800' : isExotic ? 'color:#FFD700' : '';
    const topBadge = isHeritage
      ? '<span style="position:absolute;top:2px;left:2px;font-size:9px;background:rgba(255,215,0,0.2);border-radius:3px;padding:0 2px;color:#FFD700;font-weight:800">✨ H</span>'
      : isExotic
        ? '<span style="position:absolute;top:2px;left:2px;font-size:9px">✨</span>'
        : '';
    const displayName = isHeritage ? crop.name + ' ✨' : crop.name;
    const displayQty = typeof qty === 'object' ? qty.qty || 0 : qty;
    return `<div class="seed-tile${selected ? ' selected' : ''}" onclick="selectFromStorage('${cropId}')" title="${displayName}: ${displayQty} seed${displayQty !== 1 ? 's' : ''}${isHeritage ? ' (Heritage — +20% sell value)' : isExotic ? ' (Exotic)' : ''}">
      <div class="seed-tile-art" style="${tileStyle};position:relative">
        ${topBadge}
        <svg width="52" height="52" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">${cropArt(baseCropId)}</svg>
        <span class="seed-tile-count">${displayQty}</span>
      </div>
      <div class="seed-tile-name" style="${nameStyle}">${displayName}</div>
    </div>`;
  }).filter(Boolean).join('');
}

function renderShop() {
  const list = document.getElementById('shop-crops-list');
  const banner = document.getElementById('selected-banner');
  if (!list) return;

  // Show which seed is selected for planting (pulled from storage)
  if (G.selectedCrop) {
    const sc = CROP_MAP[G.selectedCrop];
    const qty = G.inventory[G.selectedCrop] || 0;
    banner.innerHTML = `<div class="selected-indicator">
      <svg width="18" height="18" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">${cropArt(G.selectedCrop)}</svg>
      ${sc.name} ×${qty} ready to plant
      <button onclick="event.stopPropagation();clearSelectedCrop()">✕</button>
    </div>`;
  } else {
    banner.innerHTML = '';
  }

  // Group crops by unlock level
  const grouped = {};
  CROPS.forEach(c => {
    if (!grouped[c.unlockLevel]) grouped[c.unlockLevel] = [];
    grouped[c.unlockLevel].push(c);
  });
  const sortedLevels = Object.keys(grouped).map(Number).sort((a, b) => a - b);

  const regularHtml = sortedLevels.map(lvl => {
    const ld = getLevelData(lvl);
    const cropsHtml = grouped[lvl].map(crop => {
      const unlocked = isCropUnlocked(crop.id);
      const affordable = G.coins >= crop.seedCost;
      const expanded = G.shopExpanded === crop.id;
      const theme = CROP_THEME[crop.id] || { bg: '#1A1A1A', border: 'rgba(255,255,255,0.2)' };
      const inStock = G.inventory[crop.id] || 0;

      let classes = 'crop-card';
      if (expanded) classes += ' expanded';
      if (!unlocked) classes += ' locked-crop';

      const artSvg = `<svg width="36" height="36" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" style="background:${theme.bg};border-radius:6px">${cropArt(crop.id)}</svg>`;

      // Stock badge (seeds in storage)
      const stockBadge = inStock > 0
        ? `<span style="font-size:9px;background:rgba(111,207,58,0.2);color:var(--green-hi);border-radius:6px;padding:1px 4px;margin-left:3px;font-weight:800">×${inStock}</span>`
        : '';

      // Lock / level badge
      const lockBadge = !unlocked
        ? `<span class="crop-lock-badge">Lv${crop.unlockLevel}</span>`
        : '';

      // Compact card: icon + name/stats as a flex row (works well at ~120px width)
      const mainRow = `<div class="crop-card-main" style="display:flex;align-items:center;gap:7px">
        <div class="crop-card-icon">${artSvg}</div>
        <div class="crop-card-info">
          <div class="crop-card-name">${crop.name}${stockBadge}</div>
          <div class="crop-card-stats">
            <span class="crop-stat-coin">🪙${crop.seedCost}</span>
            <span class="crop-stat-sell">→${crop.sellPrice}</span>
          </div>
          <div class="crop-card-stats" style="margin-top:1px">
            <span class="crop-stat-time">${formatTime(crop.gameSecs)}</span>
          </div>
        </div>
        ${lockBadge}
      </div>`;

      let qtyPicker = '';
      if (expanded && unlocked) {
        const initQty = Math.min(1, Math.max(1, Math.floor(G.coins / crop.seedCost)));
        const totalCoins = crop.seedCost * initQty;
        const canAfford = G.coins >= crop.seedCost;
        qtyPicker = `<div class="crop-card-qty">
          <button class="qty-btn" onclick="event.stopPropagation();shopChangeQty('${crop.id}',-1)">−</button>
          <span class="qty-display" id="qty-val-${crop.id}">${initQty}</span>
          <button class="qty-btn" onclick="event.stopPropagation();shopChangeQty('${crop.id}',1)">+</button>
          <span class="qty-total" id="qty-total-${crop.id}">🪙 ${totalCoins}</span>
          <button class="buy-btn" id="buy-btn-${crop.id}"
            onclick="event.stopPropagation();buySeeds('${crop.id}',parseInt(document.getElementById('qty-val-${crop.id}').textContent))"
            ${canAfford ? '' : 'disabled'}>Buy</button>
        </div>
        <div style="display:flex;justify-content:flex-end;padding:4px 0 2px;border-top:1px solid rgba(255,209,64,0.15);margin-top:4px">
          <button class="bsv-buy-btn" id="bsv-btn-${crop.id}"
            onclick="event.stopPropagation();buySeedsBSV('${crop.id}',parseInt(document.getElementById('qty-val-${crop.id}').textContent))"
            ${G.walletConnected ? '' : 'disabled'}
            title="${G.walletConnected ? 'Pay with BSV' : 'Connect wallet to pay with BSV'}">
            ₿ <span id="qty-bsv-${crop.id}">${formatBSV(totalCoins)}</span>
          </button>
        </div>`;
      }

      return `<div class="${classes}" onclick="toggleShopCard('${crop.id}')">
        ${mainRow}
        ${qtyPicker}
      </div>`;
    }).join('');

    const dimmed = lvl > G.level ? 'opacity:0.35' : '';
    return `<div class="shop-level-divider" style="${dimmed}">Level ${lvl} — ${ld.title}</div>${cropsHtml}`;
  }).join('');

  // ── Exotic seeds section (hidden until farmer owns at least one) ────
  const ownedExotics = EXOTIC_CROPS.filter(c => (G.inventory[c.id] || 0) > 0 || (G.cropHarvests[c.id] || 0) > 0);
  let exoticHtml = '';
  if (ownedExotics.length > 0) {
    const exoticCards = EXOTIC_CROPS.map(crop => {
      const inInventory = G.inventory[crop.id] || 0;
      const everHad = (G.cropHarvests[crop.id] || 0) > 0;
      // Show card if player has seeds now OR has ever grown this crop
      if (inInventory === 0 && !everHad) return '';

      const theme = CROP_THEME[crop.id] || { bg: '#1A1A1A', border: 'rgba(255,255,255,0.2)' };
      const expanded = G.shopExpanded === crop.id;
      const affordable = G.coins >= crop.seedCost;
      const stockBadge = inInventory > 0
        ? `<span style="font-size:9px;background:rgba(255,215,0,0.2);color:#FFD700;border-radius:6px;padding:1px 4px;margin-left:3px;font-weight:800">×${inInventory}</span>`
        : '';
      const artSvg = `<svg width="36" height="36" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" style="background:${theme.bg};border-radius:6px;box-shadow:0 0 6px ${theme.border}">${cropArt(crop.id)}</svg>`;

      let classes = 'crop-card';
      if (expanded) classes += ' expanded';

      const mainRow = `<div class="crop-card-main" style="display:flex;align-items:center;gap:7px">
        <div class="crop-card-icon">${artSvg}</div>
        <div class="crop-card-info">
          <div class="crop-card-name" style="color:#FFD700">${crop.name}${stockBadge}</div>
          <div class="crop-card-stats">
            <span class="crop-stat-coin">🪙${crop.seedCost}</span>
            <span class="crop-stat-sell">→${crop.sellPrice}</span>
          </div>
          <div class="crop-card-stats" style="margin-top:1px">
            <span class="crop-stat-time">${formatTime(crop.gameSecs)}</span>
            <span style="font-size:9px;color:#FFD700;opacity:0.8">✨ Exotic</span>
          </div>
        </div>
      </div>`;

      let qtyPicker = '';
      if (expanded && inInventory > 0) {
        const initQty = 1;
        const totalCoins = crop.seedCost * initQty;
        qtyPicker = `<div style="padding:6px 0 2px;font-size:11px;color:var(--text-dim);text-align:center">Seeds obtained via Wandering Merchant only</div>`;
      } else if (expanded && inInventory === 0) {
        qtyPicker = `<div style="padding:6px 0 2px;font-size:11px;color:var(--text-dim);text-align:center">No seeds in storage — find the Wandering Merchant!</div>`;
      }

      return `<div class="${classes}" onclick="toggleShopCard('${crop.id}')" style="border-color:${theme.border};box-shadow:0 0 8px ${theme.border}">
        ${mainRow}
        ${qtyPicker}
      </div>`;
    }).filter(Boolean).join('');

    exoticHtml = `
      <div class="shop-level-divider" style="background:linear-gradient(90deg,rgba(255,215,0,0.12),rgba(255,215,0,0.04));border-color:rgba(255,215,0,0.3);color:#FFD700">
        ✨ Exotic Seeds
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px;grid-column:1 / -1">${exoticCards}</div>
    `;
  }

  list.innerHTML = regularHtml + exoticHtml;
}

// NAME EDITING

function startEditName(which) {
  const isF = which === 'farm';
  const displayId = isF ? 'farm-name-display' : 'farmer-name-display';
  const displayEl = document.getElementById(displayId);
  if (!displayEl) return;
  if (displayEl.parentElement.querySelector('.name-input')) return;

  const current = isF ? G.farmName : G.farmerName;
  const input = document.createElement('input');
  input.className = 'name-input';
  input.maxLength = 15;
  input.value = current;
  input.style.fontSize = isF ? '16px' : '14px';

  displayEl.style.display = 'none';
  displayEl.parentElement.insertBefore(input, displayEl);
  input.focus();
  input.select();

  function commit() {
    const val = input.value.trim().slice(0, 15) || (isF ? 'My Farm' : 'Farmer');
    if (isF) { G.farmName = val; } else { G.farmerName = val; }
    saveGame();
    renderHeading();
    input.remove();
    displayEl.style.display = '';
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { input.remove(); displayEl.style.display = ''; }
  });
}

function renderHeading() {
  const fn = document.getElementById('farm-name-display');
  const fr = document.getElementById('farmer-name-display');
  if (fn) fn.textContent = '🌿 ' + (G.farmName || 'My Farm');
  if (fr) fr.textContent = G.farmerName || 'Farmer';
}

function notify(msg, type='harvest') {
  const container = document.getElementById('notif-container');
  const el = document.createElement('div');
  el.className = `notif ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.add('leaving');
    setTimeout(() => el.remove(), 350);
  }, 2800);
}

function shakeStat(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.parentElement.classList.add('shake');
  setTimeout(() => el.parentElement.classList.remove('shake'), 450);
}

function showFloatLabel(text, plotIdx) {
  const grid = document.getElementById('plots-grid');
  if (!grid) return;
  const tile = grid.querySelector(`[data-idx="${plotIdx}"]`);
  if (!tile) return;
  const rect = tile.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'float-label';
  el.textContent = text;
  el.style.left = (rect.left + rect.width/2 - 20) + 'px';
  el.style.top = (rect.top) + 'px';

}

// Mins → ms helpers
const EVENT_MIN_GAP  = 2 * 60 * 1000;  // at least 2 min between events
const EVENT_MAX_GAP  = 5 * 60 * 1000;  // at most  5 min
let _nextEventTime = 0; // absolute ms for next possible event

function scheduleNextEvent() {
  const gap = EVENT_MIN_GAP + Math.random() * (EVENT_MAX_GAP - EVENT_MIN_GAP);
  _nextEventTime = Date.now() + gap;
}

function checkRandomEvent() {
  if (Date.now() < _nextEventTime) return;
  // Don't stack on top of merchant or another event
  if (!document.getElementById('event-overlay').classList.contains('hidden')) return;
  if (G.merchantActive) return;

  const eligible = RANDOM_EVENTS.filter(e => e.canTrigger());
  if (eligible.length === 0) { scheduleNextEvent(); return; }

  const ev = eligible[Math.floor(Math.random() * eligible.length)];
  showEventModal(ev);
  scheduleNextEvent();
}

function showEventModal(ev) {
  const cost = ev.cost(G.level);
  const canAfford = G.coins >= cost;
  const descText = ev.desc
    .replace('{cost}', cost)
    .replace('{steal}', '30%');

  document.getElementById('event-icon').textContent  = ev.icon;
  document.getElementById('event-title').textContent = ev.title;
  document.getElementById('event-desc').textContent  = descText;

  const btns = document.getElementById('event-btns');
  const fixLabel = ev.fixLabel(cost);

  let html = '<button class="event-btn-primary" id="ev-fix-btn"'
    + ((!canAfford && cost > 0) ? ' disabled' : '')
    + ' onclick="resolveEvent(true)">' + fixLabel + '</button>';

  if (ev.onIgnore !== null) {
    html += '<button class="event-btn-secondary" onclick="resolveEvent(false)">Ignore</button>';
  }

  btns.innerHTML = html;
  document.getElementById('event-overlay').classList.remove('hidden');
  G._eventsEncountered = (G._eventsEncountered || 0) + 1;

  // Store current event for resolving
  window._currentEvent = { ev, cost };
}

function resolveEvent(fix) {
  const { ev, cost } = window._currentEvent || {};
  if (!ev) return;
  document.getElementById('event-overlay').classList.add('hidden');
  window._currentEvent = null;

  if (fix) {
    if (cost > 0) {
      if (G.coins < cost) { notify('🪙 Not enough coins!', 'error'); return; }
      G.coins -= cost;
    }
    if (cost > 0) G._eventsFixed = (G._eventsFixed || 0) + 1;
    // Track specific event types for achievements
    if (ev.id === 'sun')  G._sunBonusCount  = (G._sunBonusCount  || 0) + 1;
    if (ev.id === 'bees') G._beeBoostCount  = (G._beeBoostCount  || 0) + 1;
    ev.onFix();
  } else if (ev.onIgnore) {
    ev.onIgnore();
  }
  saveGame();
  renderAll();
}

// Apply sun / aphid bonuses to harvest (called from harvestCrop)
function applyEventModifiers(baseCoins) {
  let coins = baseCoins;
  if (G._sunBonus) { coins = Math.floor(coins * 1.25); G._sunBonus = false; }
  if (G._aphidPenalty) { coins = Math.floor(coins * 0.80); G._aphidPenalty = false; }
  return coins;
}

const MERCHANT_DURATION = 3 * 60 * 1000; // 3 min window
const MERCHANT_MIN_GAP  = 10 * 60 * 1000;
const MERCHANT_MAX_GAP  = 15 * 60 * 1000;
let _nextMerchantTime = 0;

function scheduleNextMerchant() {
  const gap = MERCHANT_MIN_GAP + Math.random() * (MERCHANT_MAX_GAP - MERCHANT_MIN_GAP);
  _nextMerchantTime = Date.now() + gap;
}

function checkMerchant() {
  const now = Date.now();

  // If merchant is active, update timer or dismiss if expired
  if (G.merchantActive) {
    const remaining = Math.max(0, G.merchantExpiry - now);
    const timerEl = document.getElementById('merchant-timer');
    if (timerEl) timerEl.textContent = 'Leaves in ' + formatTime(remaining / 1000);
    if (remaining <= 0) { dismissMerchant(); return; }
    // Re-check affordability each tick so button enables when coins arrive
    const dealBtn = document.getElementById('merchant-deal-btn');
    if (dealBtn && window._merchantCanAfford) {
      dealBtn.disabled = !window._merchantCanAfford();
    }
    return;
  }

  if (now < _nextMerchantTime) return;
  if (!document.getElementById('event-overlay').classList.contains('hidden')) return;

  spawnMerchant();
}

function spawnMerchant() {
  // Pick a random deal type; filter ones needing crops if none growing
  const available = MERCHANT_DEALS.filter(d => !d.canTrigger || d.canTrigger());
  if (available.length === 0) { scheduleNextMerchant(); return; }

  const dealType = available[Math.floor(Math.random() * available.length)];
  const deal = dealType.makeOffer();

  G.merchantActive = true;
  G.merchantDeal = { ...deal, execute: null }; // store serialisable parts
  G.merchantExpiry = Date.now() + MERCHANT_DURATION;

  // Keep the live execute fn in memory (not in G, can't serialise functions)
  window._merchantExecute = deal.execute;
  window._merchantCanAfford = deal.canAfford;

  document.getElementById('merchant-title').textContent = dealType.title;
  document.getElementById('merchant-offer').textContent = deal.offerText;
  const dealBtn = document.getElementById('merchant-deal-btn');
  dealBtn.textContent = deal.btnText;
  dealBtn.disabled = !deal.canAfford();

  document.getElementById('merchant-banner').classList.remove('hidden');
  saveGame();
  scheduleNextMerchant();
}

function acceptMerchantDeal() {
  if (!window._merchantExecute) return;
  if (window._merchantCanAfford && !window._merchantCanAfford()) {
    notify('🪙 Not enough coins for this deal!', 'error');
    return;
  }
  G._merchantDealsAccepted = (G._merchantDealsAccepted || 0) + 1;
  window._merchantExecute();
  window._merchantExecute = null;
  window._merchantCanAfford = null;
  G.merchantActive = false;
  G.merchantDeal = null;
  checkAchievements();
  saveGame();
  renderAll();
  document.getElementById('merchant-banner').classList.add('hidden');
}

function dismissMerchant() {
  G.merchantActive = false;
  G.merchantDeal = null;
  window._merchantExecute = null;
  window._merchantCanAfford = null;
  document.getElementById('merchant-banner').classList.add('hidden');
  saveGame();
}

        });
        saveGame(); renderPlots();
        notify('🧪 Tonic boosted ' + boosted + ' crop' + (boosted !== 1 ? 's' : '') + ' by ' + d.pct + '%!', 'harvest');
      };
      break;
    case 'exotic_seed':
      window._merchantCanAfford = () => G.coins >= d.dealPrice;
      window._merchantExecute = () => {
        G.coins -= d.dealPrice;
        G.inventory[d.cropId] = (G.inventory[d.cropId] || 0) + d.qty;
        notify('✨ Got ' + d.qty + '× ' + CROP_MAP[d.cropId].name + ' exotic seed' + (d.qty > 1 ? 's' : '') + '! Check your storage!', 'levelup');
      };
      break;
    default:
      // Unknown deal type — show banner but disable button
      window._merchantExecute = null;
      window._merchantCanAfford = null;
  }

  document.getElementById('merchant-title').textContent = '🧙 Wandering Merchant';
  document.getElementById('merchant-offer').textContent = d.offerText || 'Special offer available!';
  const dealBtn = document.getElementById('merchant-deal-btn');
  dealBtn.textContent = d.btnText || 'Take Deal';
  dealBtn.disabled = !window._merchantCanAfford || !window._merchantCanAfford();
  document.getElementById('merchant-banner').classList.remove('hidden');
}

// ACHIEVEMENT DEFINITIONS
// To add new achievements: add an entry to ACHIEVEMENTS array.
// Each achievement needs: id, icon, name, desc, category, check(G)
// category: 'crops' | 'farm' | 'events'
// check(G) returns { earned: bool, progress: 0-1, progressLabel: string }
// ============================================================

// Per-crop milestone thresholds
const CROP_MILESTONES = [
  { key: 'first',    count: 1,   icon: '🌱', label: 'First Harvest',  suffix: '' },
  { key: 'seasoned', count: 10,  icon: '🌿', label: 'Seasoned',        suffix: '' },
  { key: 'veteran',  count: 50,  icon: '🥇', label: 'Veteran',          suffix: '' },
  { key: 'master',   count: 200, icon: '👑', label: 'Master Grower',    suffix: '' },
];

// Build per-crop achievements dynamically from CROPS + CROP_MILESTONES
function buildCropAchievements() {
  const out = [];
  [...CROPS, ...EXOTIC_CROPS].forEach(crop => {
    CROP_MILESTONES.forEach(m => {
      out.push({
        id: 'crop_' + crop.id + '_' + m.key,
        icon: crop.exotic ? '✨' : m.icon,
        name: crop.name + ': ' + m.label,
        desc: 'Harvest ' + crop.name + ' ' + m.count + ' time' + (m.count > 1 ? 's' : ''),
        category: 'crops',
        cropId: crop.id,
        milestone: m,
        check: (G) => {
          const n = G.cropHarvests[crop.id] || 0;
          return {
            earned: n >= m.count,
            progress: Math.min(n / m.count, 1),
            progressLabel: n + ' / ' + m.count,
          };
        },
      });
    });
  });
  return out;
}

// Build the combined list once at startup
let ALL_ACHIEVEMENTS = [];
function buildAllAchievements() {
  ALL_ACHIEVEMENTS = [...buildCropAchievements(), ...FARM_ACHIEVEMENTS];
}

// ── Achievement engine ─────────────────────────────────────
let _pendingNewAchievements = []; // ids newly earned, waiting for journal dot

function checkAchievements() {
  let anyNew = false;
  ALL_ACHIEVEMENTS.forEach(ach => {
    if (G.achievementsEarned.includes(ach.id)) return;
    const result = ach.check(G);
    if (result.earned) {
      G.achievementsEarned.push(ach.id);
      _pendingNewAchievements.push(ach.id);
      anyNew = true;
      // Toast — brief delay so it doesn't clash with harvest toast
      setTimeout(() => {
        notify('🏅 Achievement: ' + ach.name + '!', 'unlock');
      }, 600);
    }
  });
  if (anyNew) {
    saveGame();
    // Show red dot on journal button
    const dot = document.getElementById('journal-new-badge');
    if (dot) dot.style.display = 'inline-block';
  }
}

// ── Journal UI ─────────────────────────────────────────────
let _currentJTab = 'crops';

function openJournal() {
  // Show/hide market tab based on MARKETPLACE_ENABLED
  const mtb = document.getElementById('market-tab-btn');
  if (mtb) mtb.style.display = MARKETPLACE_ENABLED ? '' : 'none';
  // Clear the new-badge dot
  _pendingNewAchievements = [];
  const dot = document.getElementById('journal-new-badge');
  if (dot) dot.style.display = 'none';
  renderJournal();
  document.getElementById('journal-overlay').classList.remove('hidden');
}

function closeJournal() {
  document.getElementById('journal-overlay').classList.add('hidden');
}

function showJTab(tab) {
  _currentJTab = tab;
  document.querySelectorAll('.jtab').forEach(b => {
    const btnTab = b.getAttribute('onclick').match(/showJTab\('(\w+)'\)/)?.[1] || '';
    b.classList.toggle('active', btnTab === tab);
  });
  document.querySelectorAll('.jtab-panel').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('jtab-' + tab);
  if (el) el.classList.add('active');
  renderJournal();
}

function renderJournal() {
  const earned = new Set(G.achievementsEarned);
  const total  = ALL_ACHIEVEMENTS.length;
  const done   = earned.size;

  document.getElementById('journal-summary').textContent =
    done + ' / ' + total + ' achievements earned';

  if (_currentJTab === 'crops') renderCropsTab(earned);
  else if (_currentJTab === 'farm') renderFarmTab(earned);
  else if (_currentJTab === 'events') renderEventsTab(earned);
  else if (_currentJTab === 'leaderboard') renderLeaderboardTab();
  else if (_currentJTab === 'market') renderMarketTab();
}

function renderCropsTab(earned) {
  const panel = document.getElementById('jtab-crops');
  if (!panel) return;

  // One row per crop showing harvest count + milestone badges
  let html = '<div style="margin-bottom:10px">';
  CROPS.forEach(crop => {
    const count = G.cropHarvests[crop.id] || 0;
    const theme = CROP_THEME[crop.id] || { bg:'#1A1A1A' };
    const artSvg = '<svg width="36" height="36" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"'
      + ' style="background:' + theme.bg + ';border-radius:7px">' + cropArt(crop.id) + '</svg>';

    // Badge state for each milestone
    const badges = CROP_MILESTONES.map(m => {
      const achId = 'crop_' + crop.id + '_' + m.key;
      const isEarned = earned.has(achId);
      let cls = 'crop-badge';
      if (m.key === 'master' && isEarned) cls += ' platinum';
      else if (m.key === 'veteran' && isEarned) cls += ' gold';
      else if (isEarned) cls += ' earned';
      const tip = m.label + ' (' + m.count + '×)';
      return '<div class="' + cls + '" title="' + tip + '">' + (isEarned ? m.icon : '·') + '</div>';
    }).join('');

    const unlocked = crop.unlockLevel <= G.level || G.prestige > 0 || count > 0;
    const dimStyle = unlocked ? '' : 'opacity:0.35';
    html += '<div class="crop-journal-row" style="' + dimStyle + '">';
    html += '<div class="crop-journal-art">' + artSvg + '</div>';
    html += '<div class="crop-journal-info">';
    html += '<div class="crop-journal-name">' + crop.name + '</div>';
    html += '<div class="crop-journal-count">' + (count > 0 ? count + ' harvested' : unlocked ? 'Not yet harvested' : 'Locked — Lv' + crop.unlockLevel) + '</div>';
    html += '</div>';
    html += '<div class="crop-journal-badges">' + badges + '</div>';
    html += '</div>';
  });

  // ── Exotic crops section ───────────────────────────────────
  const seenExotics = EXOTIC_CROPS.filter(c => (G.cropHarvests[c.id] || 0) > 0 || (G.inventory[c.id] || 0) > 0);
  if (seenExotics.length > 0) {
    html += '<div style="margin:10px 0 6px;padding:5px 8px;background:linear-gradient(90deg,rgba(255,215,0,0.1),transparent);border-left:2px solid #FFD700;font-size:11px;color:#FFD700;font-weight:700;letter-spacing:0.5px">✨ EXOTIC CROPS</div>';
    EXOTIC_CROPS.forEach(crop => {
      const count = G.cropHarvests[crop.id] || 0;
      const inStorage = G.inventory[crop.id] || 0;
      if (count === 0 && inStorage === 0) return; // hidden until discovered
      const theme = CROP_THEME[crop.id] || { bg:'#1A1A1A' };
      const artSvg = '<svg width="36" height="36" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"'
        + ' style="background:' + theme.bg + ';border-radius:7px;box-shadow:0 0 6px ' + theme.border + '">' + cropArt(crop.id) + '</svg>';
      const badges = CROP_MILESTONES.map(m => {
        const achId = 'crop_' + crop.id + '_' + m.key;
        const isEarned = earned.has(achId);
        let cls = 'crop-badge';
        if (m.key === 'master' && isEarned) cls += ' platinum';
        else if (m.key === 'veteran' && isEarned) cls += ' gold';
        else if (isEarned) cls += ' earned';
        const tip = m.label + ' (' + m.count + '×)';
        return '<div class="' + cls + '" title="' + tip + '">' + (isEarned ? m.icon : '·') + '</div>';
      }).join('');
      html += '<div class="crop-journal-row" style="border-color:rgba(255,215,0,0.2)">';
      html += '<div class="crop-journal-art">' + artSvg + '</div>';
      html += '<div class="crop-journal-info">';
      html += '<div class="crop-journal-name" style="color:#FFD700">' + crop.name + ' <span style="font-size:9px;opacity:0.7">✨ Exotic</span></div>';
      html += '<div class="crop-journal-count">' + (count > 0 ? count + ' harvested' : 'In storage — plant it!') + '</div>';
      html += '</div>';
      html += '<div class="crop-journal-badges">' + badges + '</div>';
      html += '</div>';
    });
  }

  html += '</div>';
  panel.innerHTML = html;
}

function renderAchSection(title, achs, earned) {
  let html = '<div class="ach-section-title">' + title + '</div><div class="ach-grid">';
  achs.forEach(ach => {
    const result = ach.check(G);
    const isNew = _pendingNewAchievements.includes(ach.id);
    let cls = 'ach-card';
    if (result.earned && isNew) cls += ' earned-new';
    else if (result.earned) cls += ' earned';
    else if (result.progress === 0) cls += ' locked';

    const pct = Math.round(result.progress * 100);
    html += '<div class="' + cls + '">';
    if (result.earned) html += '<span class="ach-earned-tick">✓</span>';
    html += '<div class="ach-icon">' + ach.icon + '</div>';
    html += '<div class="ach-name">' + ach.name + '</div>';
    html += '<div class="ach-desc">' + ach.desc + '</div>';
    if (!result.earned && result.progress > 0) {
      html += '<div class="ach-progress">' + result.progressLabel + '</div>';
      html += '<div class="ach-progress-bar"><div class="ach-progress-fill" style="width:' + pct + '%"></div></div>';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function connectWallet() {
  if (window.platformSDK) {
    window.platformSDK.sendCommand({ type: 'connection', navbg: '#111D0F' });
    window.platformSDK.onCommand((data) => {
      if (data.type === 'connection-response') {
        if (data.payload && !data.payload.anonymous && data.payload.wallet) {
          G.walletConnected = true;
          G.walletAddress = data.payload.wallet.address;
          saveGame();
          renderAll();
          notify('✅ Wallet connected!', 'unlock');
        } else {
          notify('👤 Running anonymously — coins only mode.', 'error');
          setPlayerState('anonymous');
        }
      }
    });
  } else {
    console.log('Dev mode: no Metanet SDK. Running in coins-only mode.');
    notify('🔧 Wallet connection requires Metanet.page environment. Running in coins-only mode.', 'error');
    setPlayerState('anonymous');
  }
}

function disconnectWallet() {
  G.walletConnected = false;
  G.walletAddress = null;
  saveGame();
  renderAll();
  notify('🔌 Wallet disconnected.', 'error');
}

function setPlayerState(state) {
  if (state === 'anonymous') {
    G.walletConnected = false;
    G.walletAddress = null;
    document.getElementById('bsv-pill').style.opacity = '0.5';
  }
}

/**
 * Pay with BSV via Metanet.page wallet.
 * @param {number} satoshis  — amount in satoshis
 * @param {string} ref       — unique reference string
 * @param {Function} onSuccess — called on success
 * @param {Function} onFail    — called with error string on fail
 * @param {string} [toAddress] — override recipient (used by market purchases)
 */
function payWithBSV(satoshis, ref, onSuccess, onFail, toAddress) {
  const GAME_BSV_ADDRESS = '1LMaShk9VaQSWrsEYUukuoWMEVAJckrxCM';
  const recipient = toAddress || GAME_BSV_ADDRESS;

  if (window.platformSDK && G.walletConnected) {
    window.platformSDK.sendCommand({
      type: 'pay', ref: ref,
      recipients: [{ address: recipient, value: satoshis, note: 'Plot Twist purchase' }],
    });
    window.platformSDK.onCommand((data) => {
      if (data.type === 'pay-response' && data.payload.ref === ref) {
        if (data.payload.success) { onSuccess(data.payload); }
        else { onFail(data.payload.message || 'Payment failed'); }
      }
    });
  } else {
    console.log(`Dev mode: BSV payment stubbed (${satoshis} sats, ref: ${ref}). Use coins instead.`);
    onFail('Wallet not available in dev mode. Use coins instead.');
  }
}

function calcSuggestedPrice(baseCropId, isHeritage, qty) {
  const crop = CROP_MAP[baseCropId];
  if (!crop) return 0.00001;
  const base = crop.seedCost * 0.00001;
  let mult = isHeritage ? 1.5 : 1.0;
  if (qty >= 3) mult = isHeritage ? 4.0 : 2.8;
  return Math.round(base * mult * qty * 100000) / 100000;
}

function showListingModal() {
  if (!G.walletConnected) { notify('🔗 Connect your wallet to list seeds!', 'error'); return; }

      if (count <= 0) return null;
      const isHeritage = key.endsWith('_heritage');
      const baseCropId = isHeritage ? key.replace('_heritage', '') : key;
      const crop = CROP_MAP[baseCropId];
      return crop ? { key, count, isHeritage, baseCropId, crop } : null;

  overlay.innerHTML = `
    <div style="background:linear-gradient(160deg,#182B14 0%,#111D0F 100%);border:1.5px solid rgba(255,209,64,0.3);border-radius:18px;padding:22px 20px 18px;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.7);animation:card-pop 0.25s cubic-bezier(0.34,1.56,0.64,1)">

        <label style="font-size:11px;font-weight:700;color:var(--text-dim);display:block;margin-bottom:4px">Quantity (max: <span id="listing-qty-max">${first.count}</span>)</label>
        <div style="display:flex;align-items:center;gap:8px">

function changeListingQty(delta) {
  const select = document.getElementById('listing-crop-select');
  const valEl  = document.getElementById('listing-qty-val');
  if (!select || !valEl) return;
  const max = parseInt(select.selectedOptions[0].dataset.max) || 1;
  let val   = Math.max(1, Math.min(max, parseInt(valEl.textContent) + delta));
  valEl.textContent = val;
  updateListingModal();
}

function updateListingModal() {
  const select     = document.getElementById('listing-crop-select');
  const valEl      = document.getElementById('listing-qty-val');
  const maxEl      = document.getElementById('listing-qty-max');
  const hintEl     = document.getElementById('listing-price-hint');
  const priceInput = document.getElementById('listing-price-input');
  const packetBadge= document.getElementById('listing-packet-badge');
  if (!select || !valEl) return;

  const opt        = select.selectedOptions[0];
  const max        = parseInt(opt.dataset.max) || 1;
  const isHeritage = opt.dataset.heritage === 'true';
  const baseCropId = opt.dataset.cropid;
  let   qty        = parseInt(valEl.textContent) || 1;
  qty = Math.max(1, Math.min(max, qty));
  valEl.textContent = qty;
  if (maxEl) maxEl.textContent = max;

  const suggested = calcSuggestedPrice(baseCropId, isHeritage, qty);
  if (hintEl)      hintEl.textContent     = 'Suggested: ₿ ' + suggested.toFixed(5) + (qty >= 3 ? ' (Packet rate)' : '');
  if (priceInput)  priceInput.value       = suggested.toFixed(5);
  if (packetBadge) packetBadge.style.display = qty >= 3 ? '' : 'none';
}

async function submitListing() {
  const select     = document.getElementById('listing-crop-select');
  const valEl      = document.getElementById('listing-qty-val');
  const priceInput = document.getElementById('listing-price-input');
  if (!select || !valEl || !priceInput) return;

  const opt          = select.selectedOptions[0];
  const inventoryKey = opt.value;
  const qty          = parseInt(valEl.textContent) || 1;
  const bsvPrice     = parseFloat(priceInput.value);
  if (!bsvPrice || bsvPrice <= 0) { notify('⚠️ Please enter a valid price!', 'error'); return; }

  const isHeritage = opt.dataset.heritage === 'true';
  const baseCropId = opt.dataset.cropid;
  const crop       = CROP_MAP[baseCropId];
  if (!crop) return;

  const currentCount = (typeof G.inventory[inventoryKey] === 'object')
    ? (G.inventory[inventoryKey].qty || 0)
    : (G.inventory[inventoryKey] || 0);
  if (currentCount < qty) { notify('⚠️ Not enough seeds in storage!', 'error'); return; }

  const satoshis   = Math.round(bsvPrice * 1e8);
  const cropName   = (isHeritage ? 'Heritage ' : '') + crop.name + (qty >= 3 ? ' Packet' : '');
  const listing    = {
    id: 'listing-' + Date.now(),
    cropId: baseCropId, cropName: cropName, qty: qty,
    satoshis: satoshis, bsvPrice: bsvPrice, heritage: isHeritage,
    sellerAddress: G.walletAddress, sellerName: G.farmerName || 'Farmer',
    listedAt: Date.now(),
  };

  // Escrow: remove from inventory
  if (typeof G.inventory[inventoryKey] === 'object') {
    G.inventory[inventoryKey].qty -= qty;
    if (G.inventory[inventoryKey].qty <= 0) delete G.inventory[inventoryKey];
  } else {
    G.inventory[inventoryKey] = (G.inventory[inventoryKey] || 0) - qty;
    if (G.inventory[inventoryKey] <= 0) delete G.inventory[inventoryKey];
  }

  G.standListings = G.standListings || [];
  G.standListings.push(listing);
  saveGame();

  const modal = document.getElementById('listing-modal-overlay');
  if (modal) modal.remove();

  // Push to Supabase
  const db = lbClient();
  if (db) {
    const maxRetries = 3;
    let lastError;
    let success = false;

    for (let attempt = 1; attempt <= maxRetries; attempt++) {
      try {
        const { error } = await db.from('listings').insert({
          id: listing.id, seller_address: listing.sellerAddress,
          seller_name: listing.sellerName,
          crop_id: isHeritage ? baseCropId + '_heritage' : baseCropId,
          crop_name: cropName, qty: qty, satoshis: satoshis,
          bsv_price: bsvPrice, heritage: isHeritage, status: 'active',
        });
        if (error) throw error;

        success = true;
        notify('🥕 ' + qty + '× ' + cropName + ' listed for ₿ ' + bsvPrice.toFixed(5) + '!', 'unlock');
        break;
      } catch(e) {
        lastError = e;
        console.warn(`Listing submit attempt ${attempt}/${maxRetries} failed:`, e.message);
        if (attempt < maxRetries) {
          await new Promise(resolve => setTimeout(resolve, Math.pow(2, attempt) * 1000));
        }
      }
    }

    if (!success) {
      console.warn('Listing submit failed after all retries:', lastError.message);
      notify('🥕 Listed locally (DB sync issue — can still cancel)', 'error');
    }
  } else {
    notify('🥕 ' + qty + '× ' + cropName + ' listed for ₿ ' + bsvPrice.toFixed(5) + '!', 'unlock');
  }

  renderVegeStand();
  renderStorage();
}

async function cancelListing(listingId) {
  const listings = G.standListings || [];
  const idx      = listings.findIndex(l => l.id === listingId);
  if (idx === -1) { notify('⚠️ Listing not found!', 'error'); return; }
  const listing  = listings[idx];

  const inventoryKey = listing.heritage ? listing.cropId + '_heritage' : listing.cropId;
  G.inventory[inventoryKey] = (G.inventory[inventoryKey] || 0) + listing.qty;
  G.standListings.splice(idx, 1);
  saveGame();

  const db = lbClient();
  if (db) {
    const maxRetries = 3;
    let lastError;

    for (let attempt = 1; attempt <= maxRetries; attempt++) {
      try {
        await db.from('listings').update({ status: 'cancelled' }).eq('id', listingId);
        break; // Success, exit retry loop
      } catch(e) {
        lastError = e;
        console.warn(`Cancel listing attempt ${attempt}/${maxRetries} failed:`, e.message);
        if (attempt < maxRetries) {
          await new Promise(resolve => setTimeout(resolve, Math.pow(2, attempt) * 1000));
        }
      }
    }

    if (lastError) {
      console.warn('Cancel listing failed after all retries:', lastError.message);
      // Still proceed with local cancellation - the listing is removed locally
    }
  }

  renderVegeStand();
  renderStorage();
  notify('↩️ Listing cancelled — ' + listing.qty + '× ' + listing.cropName + ' returned to storage.', 'harvest');
}

async function fetchActiveListings(forceRefresh) {

  if (!db) return [];
  const now = Date.now();
  if (!forceRefresh && _marketCache && (now - _marketCacheTime) < MARKET_CACHE_TTL) return _marketCache;

  const maxRetries = 3;
  let lastError;

  for (let attempt = 1; attempt <= maxRetries; attempt++) {
    try {
      const { data, error } = await db.from('listings').select('*')
        .in('status', ['active', 'paused'])
        .order('listed_at', { ascending: false }).limit(50);
      if (error) throw error;

      _marketCache = data || [];
      _marketCacheTime = now;
      return _marketCache;
    } catch(e) {
      lastError = e;
      console.warn(`Market fetch attempt ${attempt}/${maxRetries} failed:`, e.message);
      if (attempt < maxRetries) {
        // Wait before retrying (exponential backoff)
        await new Promise(resolve => setTimeout(resolve, Math.pow(2, attempt) * 1000));
      }
    }
  }

  console.warn('Market fetch failed after all retries:', lastError.message);
  return _marketCache || []; // Return cached data if available, otherwise empty array
}

function renderMarketListings(listings) {
  const container = document.getElementById('market-listings-container');
  if (!container) return;

  // Filter
  let filtered = listings.filter(l => {
    if (_marketFilter === 'heritage') return l.heritage;
    if (_marketFilter === 'exotic') {
      const base = (l.crop_id || '').replace('_heritage','');
      return CROP_MAP[base] && CROP_MAP[base].exotic;
    }
    if (_marketFilter === 'standard') {
      const base = (l.crop_id || '').replace('_heritage','');
      return CROP_MAP[base] && !CROP_MAP[base].exotic;
    }
    return true;
  });

  // Sort
  filtered = [...filtered].sort((a, b) => {
    if (_marketSort === 'price_asc')  return a.satoshis - b.satoshis;
    if (_marketSort === 'price_desc') return b.satoshis - a.satoshis;
    if (_marketSort === 'qty')        return b.qty - a.qty;
    return new Date(b.listed_at || 0) - new Date(a.listed_at || 0);
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--text-dim);font-size:13px;padding:30px 0">🌱 No listings found.<br><span style="font-size:11px;opacity:0.7">Open the Vege Stand to list your exotic seeds!</span></div>';
    return;
  }

  // Store listings for buy buttons
  window._marketListings = {};
  filtered.forEach(l => { window._marketListings[l.id] = l; });

  const rowsHtml = filtered.map(l => {
    const baseCropId  = (l.crop_id || '').replace('_heritage','');
    const crop        = CROP_MAP[baseCropId] || {};
    const theme       = CROP_THEME[baseCropId] || { bg: '#1A1A1A' };
    const isExotic    = !!crop.exotic;
    const isHeritage  = !!l.heritage;
    const isPacket    = l.qty >= 3;
    const isOwn       = G.walletAddress && l.seller_address === G.walletAddress;
    const bsvDisplay  = (l.satoshis / 1e8).toFixed(5);

    const badges = [
      isHeritage ? `<span style="font-size:9px;background:rgba(255,215,0,0.2);color:#FFD700;border-radius:4px;padding:1px 4px;font-weight:800">✨ Heritage</span>` : '',
      isExotic && !isHeritage ? `<span style="font-size:9px;background:rgba(167,139,250,0.15);color:var(--xp-purple);border-radius:4px;padding:1px 4px;font-weight:800">Exotic</span>` : '',
      isPacket ? `<span style="font-size:9px;background:rgba(111,207,58,0.15);color:var(--green-hi);border-radius:4px;padding:1px 4px;font-weight:800">🌱 Packet</span>` : '',
    ].filter(Boolean).join(' ');

    const isPaused = l.status === 'paused';
    const buyCell = isPaused
      ? `<span style="font-size:10px;color:var(--text-dim);font-style:italic;background:rgba(100,100,100,0.15);border:1px solid rgba(100,100,100,0.3);border-radius:8px;padding:4px 8px;white-space:nowrap">🚫 Shop Closed</span>`
      : isOwn
        ? `<span style="font-size:10px;color:var(--text-dim);font-style:italic">Your listing</span>`
        : G.walletConnected
          ? `<button class="market-buy-btn" data-id="${l.id}" style="background:rgba(255,209,64,0.15);border:1px solid rgba(255,209,64,0.4);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:800;color:#FFD700;cursor:pointer;white-space:nowrap">Buy ₿${bsvDisplay}</button>`
          : `<span style="font-size:10px;color:var(--text-dim)">Wallet needed</span>`;

    return `<div class="market-listing-row" style="display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;background:rgba(20,42,16,0.6);border:1px solid ${isHeritage ? 'rgba(255,215,0,0.3)' : isOwn ? 'rgba(111,207,58,0.3)' : 'var(--border)'};margin-bottom:6px;${isOwn ? 'opacity:0.7' : ''}">
      <svg width="32" height="32" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" style="background:${theme.bg};border-radius:6px;flex-shrink:0${isExotic ? ';box-shadow:0 0 4px '+theme.border : ''}">${cropArt(baseCropId)}</svg>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:800;color:${isHeritage ? '#FFD700' : 'var(--text)'}">${escHtml(l.crop_name || '')} ×${l.qty}</div>
        <div style="font-size:10px;color:var(--text-dim);margin-top:1px">${escHtml(l.seller_name || 'Farmer')} · ${l.listed_at ? timeSince(new Date(l.listed_at)) : 'recently'}</div>
        ${badges ? `<div style="margin-top:3px;display:flex;gap:3px;flex-wrap:wrap">${badges}</div>` : ''}
      </div>
      ${buyCell}
    </div>`;
  }).join('');

  container.innerHTML = rowsHtml +
    `<div style="text-align:center;font-size:10px;color:var(--text-dim);margin-top:8px">Cached 30s · ${filtered.length} listing${filtered.length !== 1 ? 's' : ''} shown</div>`;

    btn.onclick = () => {
      const listing = window._marketListings[btn.dataset.id];
      if (listing) showBuyConfirm(listing);
    };
  });
}

async function executePurchase(btnEl) {
  const listing = window._pendingBuyListing;
  if (!listing) return;
  if (!G.walletConnected) { notify('🔗 Connect your wallet to buy!', 'error'); return; }

  if (btnEl) { btnEl.disabled = true; btnEl.textContent = '⏳ Paying…'; }

  const ref = 'trade-' + listing.id;

  if (window.platformSDK && G.walletConnected) {
    window.platformSDK.sendCommand({
      type: 'pay', ref: ref,
      recipients: [{ address: listing.seller_address, value: listing.satoshis,
                     note: 'Plot Twist Vege Stand: ' + (listing.crop_name || '') }],
    });

    // One-time listener — removes itself after handling the matching response
    const _payHandler = async (event) => {
      const data = event.data;
      if (!data || data.command !== 'ninja-app-command') return;
      if (data.type !== 'pay-response' || data.payload.ref !== ref) return;
      window.removeEventListener('message', _payHandler);
      if (data.payload.success) {
        const baseCropId   = (listing.crop_id || '').replace('_heritage','');
        const inventoryKey = listing.heritage ? baseCropId + '_heritage' : baseCropId;
        G.inventory[inventoryKey] = (G.inventory[inventoryKey] || 0) + listing.qty;
        saveGame();
        renderStorage();
        const overlay = document.getElementById('buy-confirm-overlay');
        if (overlay) overlay.remove();
        window._pendingBuyListing = null;
        const db = lbClient();
        if (db) {
          const maxRetries = 3;
          let updateSuccess = false;
          let insertSuccess = false;
          let lastError;

          // Update listing status
          for (let attempt = 1; attempt <= maxRetries; attempt++) {
            try {
              await db.from('listings').update({
                status: 'sold', sold_at: new Date().toISOString(), buyer_address: G.walletAddress,
              }).eq('id', listing.id);
              updateSuccess = true;
              break;
            } catch(e) {
              lastError = e;
              console.warn(`Purchase update attempt ${attempt}/${maxRetries} failed:`, e.message);
              if (attempt < maxRetries) {
                await new Promise(resolve => setTimeout(resolve, Math.pow(2, attempt) * 1000));
              }
            }
          }

          // Insert purchase record
          for (let attempt = 1; attempt <= maxRetries; attempt++) {
            try {
              await db.from('purchases').insert({
                id: 'purchase-' + Date.now(),
                listing_id: listing.id, seller_address: listing.seller_address,
                buyer_address: G.walletAddress,
                crop_id: listing.crop_id, crop_name: listing.crop_name,
                qty: listing.qty, satoshis: listing.satoshis,
              });
              insertSuccess = true;
              break;
            } catch(e) {
              lastError = e;
              console.warn(`Purchase insert attempt ${attempt}/${maxRetries} failed:`, e.message);
              if (attempt < maxRetries) {
                await new Promise(resolve => setTimeout(resolve, Math.pow(2, attempt) * 1000));
              }
            }
          }

          if (!updateSuccess || !insertSuccess) {
            console.warn('Purchase database operations failed:', lastError.message);
            // Still proceed with local inventory update - the purchase was successful
          }
        }
        _marketCache = null; _marketCacheTime = 0;
        notify('🥕 Purchased ' + listing.qty + '× ' + (listing.crop_name || '') + '! Check your storage.', 'unlock');
        const panel = document.getElementById('jtab-market');
        if (panel && panel.classList.contains('active')) renderMarketTab();
      } else {
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = 'Confirm Buy'; }
        notify('₿ Purchase failed: ' + (data.payload.message || 'Payment failed'), 'error');
      }
    };
    window.addEventListener('message', _payHandler);
  } else {
    if (btnEl) { btnEl.disabled = false; btnEl.textContent = 'Confirm Buy'; }
    notify('₿ Open inside Metanet.page to buy seeds.', 'error');
  }
}

// Cache — avoid re-fetching while the journal tab is open
let _lbCache = null;          // array of top-10 rows
let _lbCacheTime = 0;         // ms timestamp of last fetch
const LB_CACHE_TTL = 60000;   // 60 seconds

// ── Upsert the current player's score ────────────────────────
// Called from lbShareScore() — writes score then fires create-post.
async function lbSubmitScore() {
  const db = lbClient();
  if (!db || !G.walletConnected || !G.walletAddress) return false;

  const score    = calcFarmScore();
  const levelDat = getLevelData(G.level);

  // lb_users: upsert by wallet address — update name/score if improved
  const maxRetries = 3;
  let lastError;

  for (let attempt = 1; attempt <= maxRetries; attempt++) {
    try {
      const { error: ue } = await db.from('lb_users').upsert({
        address:     G.walletAddress,
        farmer_name: G.farmerName  || 'Farmer',
        farm_name:   G.farmName    || 'My Farm',
        score:       score,
        prestige:    G.prestige    || 0,
        level:       G.level,
        level_title: levelDat ? levelDat.title : '',
        updated_at:  new Date().toISOString(),
      }, { onConflict: 'address', ignoreDuplicates: false });

      if (ue) throw ue;

      // Bust the cache so the leaderboard refreshes next open
      _lbCache = null;
      _lbCacheTime = 0;
      return true;
    } catch(e) {
      lastError = e;
      console.warn(`Leaderboard submit attempt ${attempt}/${maxRetries} failed:`, e.message);
      if (attempt < maxRetries) {
        await new Promise(resolve => setTimeout(resolve, Math.pow(2, attempt) * 1000));
      }
    }
  }

  console.warn('Leaderboard submit failed after all retries:', lastError.message);
  return false;
}

// ── Fetch top 10 ──────────────────────────────────────────────
async function lbFetchTop10() {
  const db = lbClient();
  if (!db) return null;

  const now = Date.now();
  if (_lbCache && (now - _lbCacheTime) < LB_CACHE_TTL) return _lbCache;

  const maxRetries = 3;
  let lastError;

  for (let attempt = 1; attempt <= maxRetries; attempt++) {
    try {
      const { data, error } = await db
        .from('lb_users')
        .select('address, farmer_name, farm_name, score, prestige, level, level_title, updated_at')
        .order('score', { ascending: false })
        .limit(10);

      if (error) throw error;

      _lbCache = data || [];
      _lbCacheTime = now;
      return _lbCache;
    } catch(e) {
      lastError = e;
      console.warn(`Leaderboard fetch attempt ${attempt}/${maxRetries} failed:`, e.message);
      if (attempt < maxRetries) {
        // Wait before retrying (exponential backoff)
        await new Promise(resolve => setTimeout(resolve, Math.pow(2, attempt) * 1000));
      }
    }

  console.warn('Leaderboard fetch failed after all retries:', lastError.message);
  return _lbCache || null; // Return cached data if available, otherwise null
  }
}

async function lbShareScore() {
  const btn = document.getElementById('lb-share-btn');

// ── Generate a 600×400 score card as a previewAsset object ───
function lbGenerateScoreCard() {
  const canvas = document.createElement('canvas');
  canvas.width  = 600;
  canvas.height = 400;
  const ctx = canvas.getContext('2d');

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 600, 400);
  bg.addColorStop(0,   '#0C1A08');
  bg.addColorStop(0.5, '#182B14');
  bg.addColorStop(1,   '#0C1A08');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, 600, 400);

  // Subtle grid lines
  ctx.strokeStyle = 'rgba(111,207,58,0.07)';
  ctx.lineWidth = 1;
  for (let x = 0; x < 600; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 400); ctx.stroke(); }
  for (let y = 0; y < 400; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(600, y); ctx.stroke(); }

  // Gold border
  ctx.strokeStyle = 'rgba(255,209,64,0.5)';
  ctx.lineWidth = 3;
  ctx.strokeRect(4, 4, 592, 392);

  // Game title
  ctx.fillStyle = '#6FCF3A';
  ctx.shadowColor = '#6FCF3A';
  ctx.shadowBlur = 12;
  ctx.font = 'bold 28px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🌾 Plot Twist', 300, 60);

  // Farm name
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(232,245,220,0.7)';
  ctx.font = '20px Arial, sans-serif';
  ctx.fillText(G.farmName || 'My Farm', 300, 96);

  // Score
  ctx.fillStyle = '#FFD140';
  ctx.shadowColor = '#FFD140';
  ctx.shadowBlur = 20;
  ctx.font = 'bold 72px Arial, sans-serif';
  ctx.fillText(calcFarmScore().toLocaleString(), 300, 190);

  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(232,245,220,0.5)';
  ctx.font = '18px Arial, sans-serif';
  ctx.fillText('FARM SCORE', 300, 220);

  // Farmer name + level
  const ld = getLevelData(G.level);
  ctx.fillStyle = 'rgba(232,245,220,0.9)';
  ctx.font = 'bold 22px Arial, sans-serif';
  ctx.fillText(`${G.farmerName || 'Farmer'} — ${ld ? ld.title : ''} (Lv${G.level})`, 300, 268);

  // Prestige
  if (G.prestige > 0) {
    ctx.fillStyle = '#FFD140';
    ctx.font = '18px Arial, sans-serif';
    ctx.fillText(`⭐ Prestige ${G.prestige}`, 300, 300);
  }

  // Footer
  ctx.fillStyle = 'rgba(111,207,58,0.5)';
  ctx.font = '16px Arial, sans-serif';
  ctx.fillText('Play Plot Twist on Metanet.page', 300, 365);

  // Convert canvas → File + dataURL (required by create-post previewAsset)
  const dataURL = canvas.toDataURL('image/jpeg', 0.85);
  const arr = dataURL.split(',');
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  const u8 = new Uint8Array(bstr.length);
  for (let i = 0; i < bstr.length; i++) u8[i] = bstr.charCodeAt(i);
  const file = new File([u8], `plot-twist-score-${calcFarmScore()}.jpg`, { type: mime });
  return { type: 'image', file, preview: dataURL };
}

// ── Render the leaderboard journal tab ────────────────────────
async function renderLeaderboardTab() {
  const panel = document.getElementById('jtab-leaderboard');
  if (!panel) return;

  const db = lbClient();
  const score = calcFarmScore();
  const ld = getLevelData(G.level);

  // My score card at the top
  const myConnected = G.walletConnected && G.walletAddress;
  const presStr = G.prestige > 0 ? ` · Prestige ${G.prestige}` : '';
  const myCardHtml = `
    <div class="lb-my-score-card">
      <div>
        <div class="lb-label">Your Farm Score</div>
        <div class="lb-value">🏆 ${score.toLocaleString()}</div>
        <div class="lb-sub-val">${ld ? ld.title : ''} · Lv${G.level}${presStr}</div>
      </div>
      <div style="text-align:right">
        ${myConnected
          ? `<button class="lb-share-btn" onclick="lbShareScore()" style="margin-left:0">🏆 Share Score</button>
             <div style="font-size:10px;color:var(--text-dim);margin-top:4px">Submits & posts to feed</div>`
          : `<div style="font-size:11px;color:var(--text-dim)">Connect wallet to<br>join the leaderboard</div>`
        }
      </div>
    </div>`;

  // Not configured yet
  if (!db) {
    panel.innerHTML = myCardHtml + `
      <div class="lb-empty">
        🏗️ Leaderboard not configured yet.<br>
        <span style="font-size:11px;margin-top:6px;display:block">Fill in LB_CONFIG in the game script with your Supabase URL and anon key.</span>
      </div>`;
    return;
  }

  panel.innerHTML = myCardHtml + `<div class="lb-loading">⏳ Loading leaderboard…</div>`;

  const rows = await lbFetchTop10();

  if (!rows) {
    panel.innerHTML = myCardHtml + `<div class="lb-empty">⚠️ Could not load leaderboard. Check your connection.</div>`;
    return;
  }

  if (rows.length === 0) {
    panel.innerHTML = myCardHtml + `<div class="lb-empty">🌱 No scores yet — be the first!</div>`;
    return;
  }

  const rankEmoji = ['🥇','🥈','🥉'];
  const rowsHtml = rows.map((r, i) => {
    const isMine = myConnected && r.address === G.walletAddress;
    const rank   = rankEmoji[i] || `<span style="font-size:12px;font-weight:800;color:var(--text-dim)">${i+1}</span>`;
    const when   = r.updated_at ? timeSince(new Date(r.updated_at)) : '';
    const pre    = r.prestige > 0 ? ` · ⭐${r.prestige}` : '';
    return `<div class="lb-row ${isMine ? 'lb-mine' : i < 3 ? 'lb-top3' : ''}">
      <div class="lb-rank">${rank}</div>
      <div class="lb-info">
        <div class="lb-name">${escHtml(r.farmer_name)}${isMine ? ' <span style="color:var(--gold);font-size:10px">(you)</span>' : ''}</div>
        <div class="lb-sub">${escHtml(r.farm_name)} · ${r.level_title || ''} Lv${r.level}${pre} · ${when}</div>
      </div>
      <div class="lb-score">${Number(r.score).toLocaleString()}</div>
    </div>`;
  }).join('');

  const myRankRow = myConnected ? rows.findIndex(r => r.address === G.walletAddress) : -1;
  const notOnBoard = myConnected && myRankRow === -1 && rows.length >= 10;
  const notOnBoardHtml = notOnBoard
    ? `<div style="font-size:11px;color:var(--text-dim);text-align:center;margin-top:8px">
         Your score of ${score.toLocaleString()} is not in the top 10 yet.
       </div>`
    : '';

  panel.innerHTML = myCardHtml
    + `<div class="lb-section-title">🏆 Top 10 Farmers</div>`
    + rowsHtml
    + notOnBoardHtml;
}

// ── Helpers ───────────────────────────────────────────────────
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeSince(date) {
  const secs = Math.floor((Date.now() - date) / 1000);
  if (secs < 60)    return 'just now';
  if (secs < 3600)  return Math.floor(secs / 60) + 'm ago';
  if (secs < 86400) return Math.floor(secs / 3600) + 'h ago';
  return Math.floor(secs / 86400) + 'd ago';
}

// ── Show Share Score button once wallet is connected ──────────
function lbUpdateShareBtn() {
  const btn = document.getElementById('lb-share-btn');
  if (!btn) return;
  btn.style.display = G.walletConnected ? 'inline-flex' : 'none';
}

function init() {
  loadGame();

  // Try to connect wallet if platform SDK present
  if (window.platformSDK) {
    connectWallet();
  }

  buildAllAchievements();
  checkAchievements(); // evaluate on load (for returning players)
  // Return escrowed stand seeds if marketplace is disabled
  if (!MARKETPLACE_ENABLED) {
    returnStandSeedsToStorage();
  } else {
    // Show stand area
    const standArea = document.getElementById('vege-stand-area');
    if (standArea) standArea.style.display = '';
  }
  renderAll();

  // Schedule first event and merchant
  scheduleNextEvent();
  scheduleNextMerchant();
  restoreMerchantIfActive();

  // Close journal on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeJournal();
      document.getElementById('event-overlay').classList.add('hidden');
      const hf = document.getElementById('harvest-fork-overlay');
      if (hf) hf.remove();
      if (G.fertiliseMode) {
        G.fertiliseMode = false;
        renderPlots();
        renderCompost();
      }
    }
  });

  // ── Pinch-zoom stuck overlay fix ────────────────────────────
  // Pinch gestures fire resize and can accidentally trigger a tap
  // on a market listing row, creating a buy-confirm overlay that
  // then sits invisibly blocking all further interaction.
  // Two defences:
  //   1. Track active touch count — if >1 fingers are down, flag
  //      a brief suppression window so the subsequent click is ignored.
  //   2. On any resize (which pinch-zoom always fires), dismiss any
  //      orphaned buy-confirm overlay and clear pending state.

  let _touchCount = 0;
  let _suppressNextClick = false;

  document.addEventListener('touchstart', e => {
    _touchCount = e.touches.length;
    if (_touchCount > 1) {
      _suppressNextClick = true;
    }
  }, { passive: true });

  document.addEventListener('touchend', e => {
    _touchCount = e.touches.length;
    // Keep suppression active for 400ms after pinch ends
    if (_suppressNextClick) {
      setTimeout(() => { _suppressNextClick = false; }, 400);
    }
  }, { passive: true });

  // Intercept clicks on market listing buy buttons during/after pinch
  document.addEventListener('click', e => {
    if (_suppressNextClick && e.target.closest && e.target.closest('.market-buy-btn')) {
      e.stopImmediatePropagation();
      e.preventDefault();
    }
  }, true);

  // On resize (fired by pinch-zoom), dismiss any stuck buy overlay
  window.addEventListener('resize', () => {
    const overlay = document.getElementById('buy-confirm-overlay');
    if (overlay) {
      overlay.remove();
      window._pendingBuyListing = null;
    }
  });

  // Tick every second
  setInterval(tick, 1000);

  // Also re-render shop when coins change (handled in renderAll already)
}

// Run
init();
</script>
